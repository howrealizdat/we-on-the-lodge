// --- Sunken trench walls (the real M-10 Lodge is a DEPRESSED freeway: concrete
// retaining walls on both sides, city above). Pure HUD overlay — reads the engine's
// already-projected road-edge corners and paints concrete rising from each edge, with
// a neon rim on top. Touches NO physics: the cars never see this; it only paints. ---
// ========================================================================
//  MASTER OFF SWITCH for the experimental trench walls. Set to false to
//  remove them completely (game looks exactly as it did before walls).
const TRENCH_WALLS_ON = true;
//  Solid walls: stop the car AT the wall instead of letting it drive through.
//  Set false to make the walls drive-through again (no collision).
const SOLID_WALLS_ON  = true;
// ========================================================================
const WALL = { height:280, face:'#c9bca0', faceR:'#bdb094', base:'#4a4034', baseFrac:0.30, maxAhead:120,
               offset:420 };   // SHOULDER (June 7, 2026): walls sit this many world-units OUTSIDE
                               // the road edge — like a real freeway's shoulder lane. Road keeps
                               // its full width; you only meet concrete if you're way out there.
function _wt(k,d){ return (typeof window!=='undefined'&&typeof window['_wall'+k]==='number')?window['_wall'+k]:d; }

// Keep the player's car body just inside the walls (the walls sit at the road edge
// ±q4; the engine otherwise lets the car drift ~1 car-width PAST that into the old
// off-road margin — which read as driving through the wall). Player-only; a pure
// position clamp, no velocity/physics math — steer away and you peel off the wall.
// Wall collision with a real consequence (not just a silent stop): first contact at
// speed = IMPACT (hard speed loss + a kick off the wall); holding into it = SCRAPE
// (keeps bleeding speed). drawWallHitFX() paints sparks + an edge flash. Player-only.
// FEEL TUNING (June 7, 2026): walls were punishing — every touch halved your speed and
// grinding bled it fast, which made the walled Lodge less fun than the open road. Real
// freeways have a shoulder, and arcade games punish the CRASH, not the graze. Knobs:
// RE-TUNED June 7, 2026 (round 3, after Edmund's test): THE RUN-THROUGH BUG IS DEAD. The
// engine stores a car's x as its LEFT EDGE (clean source: carRightSide = x + width), but
// the old clamp treated x as the car's CENTER — so it stopped you half a car short of the
// LEFT wall and let you sink half a car THROUGH the RIGHT wall. Collision math now uses
// the real edges. Plus Edmund's shoulder design: walls are painted WALL.offset (420) units
// outside the road edge — full-width road, real freeway shoulder, and you only meet the
// concrete way out there. Knobs:
//   impactKeep — speed kept on a hard hit (0.5 = old brutal halving, 0.72 = firm but fair)
//   scrapeKeep — speed kept per frame held against the wall (riding concrete costs you)
//   kickback   — how far a hard hit BOUNCES you back off the concrete
// scrapeKeep is PER FRAME — 0.96/frame compounded to losing 91% of speed per second
// (Claude's test drive June 7: pinned at the wall = stuck at 35mph). 0.995/frame ≈ a
// gentle ~25%/sec bleed; the engine's off-road drag does the real slowing out there.
// visualPad (June 7, 2026): the engine's physics box (500 world-units) is narrower than the
// car ART we draw on top — so the box stopped at the wall while the art hung halfway over it.
// The pad widens the wall-collision box to match the car you actually SEE.
const WALL_FEEL = { impactKeep:0.72, scrapeKeep:0.995, kickback:120, visualPad:240 };
// NO AI IN THE EMERGENCY LANE (June 7, 2026 — Edmund's rule): every car except yours is
// clamped to the road proper, every frame. The AI can pass, jockey, crowd you — but never
// set a wheel on the shoulder, so they can never touch (or pass through) the wall. Only
// YOU can use the shoulder, and the concrete handles you if you overdo it.
const AI_ROAD_ONLY = true;
function clampAICarsToRoad(){
  if(!AI_ROAD_ONLY) return;
  if(typeof cars==='undefined'||!cars||typeof u1==='undefined'||!u1||typeof q4==='undefined') return;
  const PAD=30;                                            // tiny margin inside the lane line
  for(const c of cars){
    if(c===u1) continue;
    const w=c._realW||c.width||500;                        // _realW: rivals' width is zeroed during engine draw
    if(c.x < -q4+PAD) c.x = -q4+PAD;                       // x is the car's LEFT edge
    else if(c.x+w > q4-PAD) c.x = q4-PAD-w;
  }
}

// PLAYER CAR BUMPER (June 13, 2026 — Edmund's real ask; replaces the v3.5 keep-out):
// the player car is a WIDE, TRANSPARENT overlay sprite, but the engine's car-vs-car
// collision only uses the narrow 500-unit physics box — so when an AI / rival car HITS
// you it slides INTO the art and looks like it's driving underneath / through your car.
// This gives your car a SOLID invisible bumper that matches the car you actually SEE
// (the WALL_FEEL.visualPad box, plus some length down the track) and BOUNCES any car
// that rams it. YOUR car is the immovable bumper (your steering + the wall clamp own
// your position); only the OTHER car reacts — so "other cars bounce off you" like real
// physics. It resolves along whichever axis the other car is penetrating LEAST:
//   • a SIDE-SWIPE (or a car ahead you've caught) → shoved out the nearer road-clear side
//   • a car ramming your TAIL → knocked back off your bumper + a speed drop (the bounce);
//     while it stays jammed against you it's held at the bumper and capped to your speed
//     (it can't push through you).
// Pure position + speed nudge on the OTHER car, no engine edits. Runs AFTER
// clampAICarsToRoad so the shove sticks, and never parks a car off the road. Per-car
// _pcHit flag = first-frame contact (the hard bonk) vs held grind. Knobs (BUMPER):
//   zLen    — how long the bumper box is down-track (bigger = cars react sooner)
//   pad     — lateral pad (world units) sized to the VISIBLE sprite, NOT the engine's
//             narrow physics box. MEASURED June 13 in Chrome: the Challenger sprite is
//             409px wide on the 1024 canvas (screen 307→717); the old 240 pad only
//             reached screen 671, so cars still tucked ~46px under the rear corners.
//             480 puts the box edges right at the sprite edges (screen ~302 / ~722).
//   clear   — EMPTY BUFFER RING (world units) kept around the car. This is what
//             makes cars bounce off while still a bit AWAY instead of touching the
//             paint — the barrier sits this far OUTSIDE the visible sprite on every
//             side (and ahead/behind). 150 ≈ ~70px gap on screen. Bigger = cars stay
//             further off you; smaller = they can get closer before bouncing.
//   gap     — tiny extra nudge past the ring when a car is shoved off your flank
//   knock   — extra knock-back (world units) on the first tail hit
//   hitKeep — speed the rammer keeps on a REAR bonk (0.55 = loses ~45%)
//   sideKeep— speed the car keeps on a SIDE/FRONT clip (0.70 = loses ~30% so it
//             peels off and falls away in a different direction instead of grinding)
//   kickSide— small extra outward shove (world units) on a side/front bounce, so
//             the deflection is visible (the car visibly veers off your flank)
const BUMPER = { on:true, zLen:640, pad:480, clear:150, gap:30, knock:220, hitKeep:0.55, sideKeep:0.70, kickSide:70 };
function playerBumper(){
  if(!BUMPER.on) return;
  if(typeof cars==='undefined'||!cars||typeof u1==='undefined'||!u1||typeof q4==='undefined') return;
  if(typeof v3==='undefined'||!v3) return;
  const L=v3.r2(); if(!L) return;
  const pad=BUMPER.pad, clear=BUMPER.clear;                 // pad = the VISIBLE sprite width (measured); clear = empty buffer ring around it
  const pL=u1.x-pad/2-clear, pR=u1.x+(u1.width||500)+pad/2+clear;  // barrier = the car you SEE + the clearance ring
  const pcen=(pL+pR)/2, pV=Math.max(0,u1.v7||0);            // your current speed (the cap on a held rammer)
  const zHalf=BUMPER.zLen/2+clear, PAD=30;                  // ring also extends ahead/behind (round-ish bubble)
  for(const c of cars){
    if(c===u1) continue;
    let dz=c.z-u1.z; dz=((dz%L)+L)%L; if(dz>L/2)dz-=L;       // +ahead / -behind, wrap-aware
    if(Math.abs(dz)>zHalf){ c._pcHit=false; continue; }     // not touching down-track → clear contact
    const cw=c._realW||c.width||500;
    const cL=c.x, cR=cL+cw;
    const ox=Math.min(cR,pR)-Math.max(cL,pL);               // lateral penetration depth
    if(ox<=0){ c._pcHit=false; continue; }                  // overlapping in z but clear to the side → no contact
    const oz=zHalf-Math.abs(dz);                            // longitudinal penetration depth
    const minX=-q4+PAD, maxX=q4-PAD-cw;                     // legal left-edge range (stay on road)
    const firstHit=!c._pcHit; c._pcHit=true;
    if(ox<=oz || dz>=0){
      // SIDE-SWIPE, or a car ahead you've caught → DEFLECT it out the nearer road-clear
      // side and bleed its speed so it peels off in a different direction (never grinds
      // alongside or creeps under you).
      const rightX=pR+BUMPER.gap, leftX=pL-BUMPER.gap-cw;
      const canRight=rightX<=maxX, canLeft=leftX>=minX;
      const ccen=cL+cw/2;
      let dir=0;
      if(ccen>=pcen){ if(canRight){c.x=rightX;dir=1;} else if(canLeft){c.x=leftX;dir=-1;} }
      else          { if(canLeft){c.x=leftX;dir=-1;} else if(canRight){c.x=rightX;dir=1;} }
      if(firstHit && dir!==0){
        const mag=Math.min(1,0.45+Math.abs((c.v7||0)-pV)/(u1.r6||26000));
        _bumpHit(dir,mag);                                   // FEEL: thud + sparks + flash + shake on the hit side
        c.v7=(c.v7||0)*BUMPER.sideKeep;                     // the bounce: lose speed, peel away
        c.x += dir*BUMPER.kickSide;                          // small extra outward kick so the veer is visible
        if(c.x<minX)c.x=minX; else if(c.x>maxX)c.x=maxX;     // re-clamp to the road
      } else if((c.v7||0)>pV){ c.v7=pV; }                    // held alongside: can't out-push you
      // (if somehow boxed in on the wide road, leave it — clampAICarsToRoad keeps it legal)
    } else {
      // a car ramming your TAIL → knock it back off your bumper + bleed its speed (the bounce)
      c.z=((u1.z - zHalf - (firstHit?BUMPER.knock:2))%L+L)%L;
      if(firstHit){
        _bumpHit(0,Math.min(1,0.5+Math.abs((c.v7||0)-pV)/(u1.r6||26000)));  // FEEL: rear bonk
        c.v7=(c.v7||0)*BUMPER.hitKeep;                       // the bonk: real speed drop on first contact
      }
      else if((c.v7||0)>pV) c.v7=pV;                         // held: can't out-push you (capped to your speed)
    }
  }
}

// BUMPER IMPACT FX (June 13, 2026): give the bounce some FEEL — a thud, a spark
// burst + bright flash at the contact point, and a quick car shake (same family as
// the wall-hit FX). Triggered by playerBumper on first contact via _bumpHit(side,mag)
// where side = +1 right / -1 left / 0 rear. Pure overlay + a synth blip, no engine
// edits. Knobs are inline (durations/colors). Self-clears by time, so it can never
// freeze on the results screen.
let _bumpT=0,_bumpSide=0,_bumpMag=0,_bumpSnd=0;
function _bumpHit(side,mag){
  _bumpT=Date.now(); _bumpSide=side; _bumpMag=Math.max(0.35,Math.min(1,mag||0.6));
  if(_bumpT-_bumpSnd>90){ _bumpSnd=_bumpT; _bumpThud(); }   // throttle: many cars same frame = one thud
}
function _bumpThud(){
  try{
    if(!_sctx){ try{ _screechInit(); }catch(e){} }
    if(!_sctx) return;
    if(_sctx.state==='suspended'){ try{ _sctx.resume().catch(()=>{}); }catch(e){} }
    const t=_sctx.currentTime;
    // low body thump
    const o=_sctx.createOscillator(); o.type='square';
    o.frequency.setValueAtTime(155,t); o.frequency.exponentialRampToValueAtTime(58,t+0.12);
    const og=_sctx.createGain(); og.gain.setValueAtTime(0.0001,t);
    og.gain.exponentialRampToValueAtTime(0.30,t+0.006); og.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
    o.connect(og); og.connect(_sctx.destination); o.start(t); o.stop(t+0.18);
    // short noise crunch on top
    const dur=0.11, buf=_sctx.createBuffer(1,Math.max(1,Math.floor(_sctx.sampleRate*dur)),_sctx.sampleRate);
    const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=(Math.random()*2-1)*(1-i/dd.length);
    const src=_sctx.createBufferSource(); src.buffer=buf;
    const bp=_sctx.createBiquadFilter(); bp.type='lowpass'; bp.frequency.value=1500;
    const g=_sctx.createGain(); g.gain.setValueAtTime(0.20,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(bp); bp.connect(g); g.connect(_sctx.destination); src.start(t); src.stop(t+dur);
  }catch(e){}
}
function drawBumpFX(){
  if(!_bumpT) return;
  const dt=Date.now()-_bumpT; if(dt>300) return;
  const a=(1-dt/300)*_bumpMag, side=_bumpSide;
  let cx,cy;
  if(side>0){ cx=512+215; cy=575; } else if(side<0){ cx=512-215; cy=575; } else { cx=512; cy=712; }
  // bright white impact flash on the contact side (or across the rear)
  if(side!==0){
    const g=hctx.createLinearGradient(side>0?1024:0,0,side>0?760:264,0);
    g.addColorStop(0,'rgba(255,255,255,'+(0.5*a).toFixed(3)+')');
    g.addColorStop(1,'rgba(180,220,255,0)');
    hctx.fillStyle=g; hctx.fillRect(side>0?760:0,0,264,768);
  } else {
    const g=hctx.createLinearGradient(0,768,0,540);
    g.addColorStop(0,'rgba(255,255,255,'+(0.45*a).toFixed(3)+')');
    g.addColorStop(1,'rgba(180,220,255,0)');
    hctx.fillStyle=g; hctx.fillRect(300,560,424,208);
  }
  // spark burst spraying outward from the contact point
  hctx.save(); hctx.lineCap='round';
  for(let i=0;i<12;i++){
    const len=(8+Math.random()*34)*_bumpMag;
    const sx=cx+(Math.random()-0.5)*46, sy=cy+(Math.random()-0.5)*70;
    hctx.globalAlpha=a*(0.5+Math.random()*0.5);
    hctx.strokeStyle=i%2?'#fff7cf':'#ffd86b'; hctx.lineWidth=1+Math.random()*2.2;
    const ang = side!==0 ? side : (Math.random()<0.5?-1:1);   // outward to the hit side (random for rear)
    hctx.beginPath(); hctx.moveTo(sx,sy);
    hctx.lineTo(sx+ang*len*(0.4+Math.random()), sy+len*0.5*(Math.random()-0.1));
    hctx.stroke();
  }
  hctx.restore(); hctx.globalAlpha=1;
}

// THE THREE-ZONE DESIGN (June 7, 2026 — the period-correct NES solve):
//   1. ROAD     = racing. Full speed.
//   2. SHOULDER = penalty zone (Al Unser / OutRun style): you CAN swerve onto it, but the
//                 engine's off-road drag slows you and the car rumbles hard — instant
//                 "get back on the road" feedback. AI never comes out here (AI_ROAD_ONLY).
//   3. WALL     = last resort: bounce + sparks + big speed hit, at the painted concrete.
// Each layer backs up the last, so the wall is no longer a problem: AI can't reach it,
// and you only meet it after the shoulder has already warned and slowed you.
// PLAYER_ROAD_ONLY = true instead gives the F-Zero style hard edge at the lane line.
const PLAYER_ROAD_ONLY = false;
let _wallContact=false, _wallHitT=0, _wallHitSide=0, _wallHitMag=0;
function clampPlayerToWalls(){
  if(!SOLID_WALLS_ON) return;
  if(typeof u1==='undefined'||!u1||typeof q4==='undefined') return;
  const OFF=PLAYER_ROAD_ONLY ? 0 : _wt('Off', WALL.offset);
  const pad=WALL_FEEL.visualPad/2;                         // physics box → visual box (art is wider)
  const W=(u1.width||500)+WALL_FEEL.visualPad;             // widened collision box, centered
  const wallL=-(q4+OFF)+pad, wallR=q4+OFF+pad;             // boundary: road edge (or concrete if shoulder allowed)
  let side = (u1.x+W>wallR) ? 1 : (u1.x<wallL ? -1 : 0);   // x is the car's LEFT edge (pad split evenly)
  if(side!==0){
    const spd = carSpeed01();                              // 0..1
    if(!_wallContact && spd>0.06){                         // IMPACT — you slammed it
      u1.v7 *= WALL_FEEL.impactKeep;                       // firm speed loss
      u1.x = side>0 ? wallR-W-WALL_FEEL.kickback           // BOUNCE — concrete throws you back
                    : wallL+WALL_FEEL.kickback;
      _wallHitMag = Math.min(1, 0.55+spd*0.45);
    }else{                                                 // SCRAPE — held against the concrete
      if(spd>0.02) u1.v7 *= WALL_FEEL.scrapeKeep;          // riding the wall keeps costing you
      u1.x = side>0 ? wallR-W-2 : wallL+2;                 // held at the face (never past it)
      _wallHitMag = Math.max(_wallHitMag*0.85, 0.22+spd*0.35);
    }
    _wallContact=true; _wallHitT=Date.now(); _wallHitSide=side;
  }else{
    _wallContact=false;
  }
}

// Sparks + edge flash for ~320ms after a wall hit, scaled by impact strength.
function drawWallHitFX(){
  if(!SOLID_WALLS_ON || !_wallHitT) return;
  const dt=Date.now()-_wallHitT; if(dt>320) return;
  const a=(1-dt/320)*_wallHitMag, side=_wallHitSide;
  // warm edge flash on the side you hit
  const x0=side>0?1024:0, x1=side>0?760:264;
  const g=hctx.createLinearGradient(x0,0,x1,0);
  g.addColorStop(0,'rgba(255,165,50,'+(0.45*a).toFixed(3)+')');
  g.addColorStop(1,'rgba(255,165,50,0)');
  hctx.fillStyle=g; hctx.fillRect(side>0?760:0,0,264,768);
  // spark streaks off the car's contact edge, spraying back along the wall
  const cx=512+side*215, cy=585;
  hctx.save(); hctx.lineCap='round';
  for(let i=0;i<11;i++){
    const len=(7+Math.random()*30)*_wallHitMag;
    const sx=cx+(Math.random()-0.5)*40, sy=cy+(Math.random()-0.5)*90;
    hctx.globalAlpha=a*(0.5+Math.random()*0.5);
    hctx.strokeStyle=i%2?'#ffd86b':'#fff7cf'; hctx.lineWidth=1+Math.random()*2;
    hctx.beginPath(); hctx.moveTo(sx,sy);
    hctx.lineTo(sx-side*len, sy+len*0.5*(Math.random()-0.2));   // back + down
    hctx.stroke();
  }
  hctx.restore(); hctx.globalAlpha=1;
}

function drawTrenchWalls(accent){
  if(!TRENCH_WALLS_ON) return;                              // master off switch
  if(typeof window!=='undefined'&&window._wallsOff) return;
  if(typeof v3==='undefined'||!v3||typeof u1==='undefined'||!u1||typeof v2==='undefined'||!v2) return;
  const segLen=v2.u0Length, count=v3.o9Count(), camIdx=Math.floor(u1.z/segLen);
  const H=_wt('H', WALL.height);
  // far -> near so nearer slabs cleanly overdraw farther ones (painter's algorithm)
  for(let ahead=_wt('Far',WALL.maxAhead); ahead>=1; ahead--){
    const idx=((camIdx+ahead)%count+count)%count;
    const seg=v3.n1(idx*segLen);
    if(!seg||!seg.p1||!seg.p1.u6||!seg.p2||!seg.p2.u6||!seg.p3||!seg.p3.u6||!seg.p4||!seg.p4.u6) continue;
    const nL=seg.p1.u6, nR=seg.p2.u6, fR=seg.p3.u6, fL=seg.p4.u6;   // near-L/R, far-R/L
    const nSc=nL.scale, fSc=fR.scale;
    if(!(nSc>0)||!(fSc>0)) continue;
    const hN=H*nSc*width/2, hF=H*fSc*width/2;
    if(hN<1.2) continue;                                     // whole segment sub-pixel: skip
    // SHOULDER (June 7, 2026): paint each wall WALL.offset world-units OUTSIDE the road
    // edge (scaled into screen space), so there's a shoulder lane between road and concrete.
    // FIX (later that night): the offsets are now passed SEPARATELY so the degenerate-edge
    // guards judge the ORIGINAL road edge — shifting near/far points by different amounts
    // was widening the edge span past the guard limit and silently ERASING the right wall
    // on left curves (the "you can go right through" bug from Edmund's screenshot).
    const OFF=_wt('Off',WALL.offset), oN=OFF*nSc*width/2, oF=OFF*fSc*width/2;
    // Guard EACH wall on its OWN edge — so hugging one wall (which throws the FAR
    // edge off-screen and degenerate) can't erase the near wall you're pressed against.
    _tryWall(nL,fL, -oN,-oF, hN,hF, accent, _activeWall.face);    // LEFT,  drawn shifted out
    _tryWall(nR,fR, +oN,+oF, hN,hF, accent, _activeWall.faceR);   // RIGHT, drawn shifted out
  }
}

// Draw one wall only if ITS OWN edge projects cleanly. Per-wall guards (replacing the
// old per-segment ones) are what fix the "drive through the right wall" bug: a degenerate
// far edge on one side no longer skips the good near wall on the other side.
function _tryWall(nearP, farP, offN, offF, hN, hF, accent, faceCol){
  const nx=nearP.x, ny=nearP.y, fx=farP.x, fy=farP.y;
  if(!Number.isFinite(nx)||!Number.isFinite(ny)||!Number.isFinite(fx)||!Number.isFinite(fy)) return;
  if(ny<fy) return;                       // near must sit lower than far (stale/occluded)
  if(Math.abs(fx-nx)>600) return;         // degenerate lateral span — judged on the REAL road edge
  if(ny>1500) return;                     // was 900 — skipped the slab RIGHT BESIDE the car when
                                          // hugging the wall (Claude's test drive). Canvas clips
                                          // below-screen geometry safely, so allow it lower.
  _wallSlab(nx+offN,ny, fx+offF,fy, hN,hF, accent, faceCol);   // shoulder offset applied only to the DRAW
}

function _wallSlab(nx,ny, fx,fy, hN,hF, accent, faceCol){
  // main concrete face
  hctx.beginPath();
  hctx.moveTo(nx,ny); hctx.lineTo(fx,fy);
  hctx.lineTo(fx,fy-hF); hctx.lineTo(nx,ny-hN); hctx.closePath();
  hctx.fillStyle=faceCol; hctx.fill();
  // darker weathered base along the bottom
  const bf=WALL.baseFrac;
  hctx.beginPath();
  hctx.moveTo(nx,ny); hctx.lineTo(fx,fy);
  hctx.lineTo(fx,fy-hF*bf); hctx.lineTo(nx,ny-hN*bf); hctx.closePath();
  hctx.fillStyle=_activeWall.base; hctx.fill();
  // Top-edge cap. Lodge (night) = neon accent rim with glow (synthwave vibe).
  // Belle Isle (day) sets _activeWall.rim to a solid concrete cap = NO neon glow,
  // so the Grand Prix barrier reads as plain daylight concrete.
  hctx.beginPath();
  hctx.moveTo(nx,ny-hN); hctx.lineTo(fx,fy-hF);
  if(_activeWall.rim){
    hctx.strokeStyle=_activeWall.rim; hctx.lineWidth=Math.max(1, hN*0.03); hctx.stroke();
  } else {
    hctx.strokeStyle=accent; hctx.lineWidth=Math.max(1, hN*0.025);
    hctx.shadowColor=accent; hctx.shadowBlur=10; hctx.stroke(); hctx.shadowBlur=0;
  }
}

// === BELLE ISLE RIVER WATER (June 11, 2026) ==================================
// The Detroit River, beyond the right-hand GP barrier — Belle Isle only.
// Driving the loop counter-clockwise the water is on your RIGHT; the island
// interior + park trees stay on the LEFT. HOW: every frame we trace the RIGHT
// barrier's outer base line using the same engine-projected road-edge points the
// wall painter reads, build a polygon from that line out to the right screen
// edge, and fill it with a water gradient + animated NES shimmer lines. Drawn
// BEFORE the barrier slabs, so the concrete cleanly overlaps the shoreline.
// Pure HUD paint — zero physics, Lodge untouched (levelIdx guard). Knobs:
//   far/near — water color at the horizon / near the seawall. far matches the
//              skyline's BELLE_WATER band bottom so river + horizon read as one
//              continuous sheet of water.
//   shimmer  — strength of the moving light ripples (0 = flat dead water)
const RIVER_ON = true;
const RIVER = { far:'#2c79a8', near:'#1d6390', shimmer:0.12 };
function drawBelleWater(){
  if(!RIVER_ON || levelIdx!==1) return;
  if(typeof v3==='undefined'||!v3||typeof u1==='undefined'||!u1||typeof v2==='undefined'||!v2) return;
  const segLen=v2.u0Length, count=v3.o9Count(), camIdx=Math.floor(u1.z/segLen);
  const OFF=_wt('Off',WALL.offset);
  // Trace the right barrier's outer base, near -> far. We read much farther than
  // the wall painter (it stops when slabs go sub-pixel) so the water runs all the
  // way to the horizon. Ground plane = farther is always higher on screen, so the
  // monotonic filter keeps a clean silhouette through curves.
  const line=[]; let minY=Infinity;
  for(let ahead=1; ahead<=299; ahead++){
    const idx=((camIdx+ahead)%count+count)%count;
    const seg=v3.n1(idx*segLen);
    if(!seg||!seg.p2||!seg.p2.u6) continue;
    const p=seg.p2.u6, sc=p.scale;
    if(!(sc>0)) continue;
    const x=p.x+OFF*sc*width/2, y=p.y;
    if(!Number.isFinite(x)||!Number.isFinite(y)||y>1500) continue;
    if(y<minY){ line.push({x,y}); minY=y; }
  }
  if(line.length<6) return;
  const top=line[line.length-1].y, R=1034;     // horizon-most point + right overdraw edge
  hctx.save();
  hctx.beginPath();
  hctx.moveTo(R,778);                          // bottom-right corner of the screen
  hctx.lineTo(line[0].x,line[0].y);            // in to the nearest seawall point
  for(const p of line) hctx.lineTo(p.x,p.y);   // up the seawall line toward the horizon
  hctx.lineTo(R,top);                          // out to the right screen edge
  hctx.closePath();
  hctx.clip();
  const g=hctx.createLinearGradient(0,top,0,768);
  g.addColorStop(0,RIVER.far); g.addColorStop(1,RIVER.near);
  hctx.fillStyle=g; hctx.fillRect(0,top,1034,778-top);
  // NES shimmer: thin light ripple lines — spacing widens toward the camera
  // (perspective) and the brightness breathes over time so the surface is alive.
  if(RIVER.shimmer>0){
    const t=Date.now()/600;
    let y=top+3, i=0;
    while(y<772){
      const a=RIVER.shimmer*(0.45+0.55*Math.sin(t+i*1.7));
      if(a>0.015){
        hctx.strokeStyle='rgba(255,255,255,'+a.toFixed(3)+')';
        hctx.lineWidth=Math.max(1,(y-top)*0.012);
        hctx.beginPath(); hctx.moveTo(0,y); hctx.lineTo(1034,y); hctx.stroke();
      }
      y+=4+(y-top)*0.16; i++;
    }
  }
  hctx.restore();
}

// === LAUNCH SMOKE (June 7, 2026) =============================================
// Burnout smoke billows off the rear tires when the field pulls out at GO! —
// your car AND the rivals on the grid ahead. Chunky, blocky puffs (squares
// snapped to a pixel grid — NES smoke, not a soft photoshop cloud) that grow,
// drift, and fade. Pure HUD paint, no physics. Switch: SMOKE_ON. Knobs: SMOKE.
const SMOKE_ON = true;
const SMOKE = {
  launchMs: 2200,   // how long after GO! the burnout lasts
  perWheel: 2,      // puffs spawned per rear wheel per frame during launch
  size:     1.6,    // overall puff size multiplier (1.0 hid under the dashboard; 2.1 too much cloud)
  grow:     0.75,   // how fast puffs swell
  fade:     0.011,  // alpha lost per frame (smaller = longer-lived smoke)
  shade:    225     // gray level — 225 = white-ish burnout rubber smoke
};
let _smoke=[];
function _launchSmokeActive(){
  return SMOKE_ON && _goHoldStart && (Date.now()-_goHoldStart)<SMOKE.launchMs
         && typeof race!=='undefined' && race.state===4;
}
function spawnSmoke(x,y,scale,drift){
  if(_smoke.length>260) return;                       // hard cap, never runaway
  _smoke.push({ x, y,
    vx:((Math.random()-0.5)*1.6+drift)*1.6,           // v2: kicks harder to the sides
    vy:-(0.5+Math.random()*1.1),                      // v2: RISES — falling puffs vanished under the dashboard
    r:(5+Math.random()*9)*scale*SMOKE.size,
    vr:SMOKE.grow*scale*SMOKE.size,
    a:0.40+Math.random()*0.25 });
}
function drawSmoke(){
  if(!_smoke.length) return;
  hctx.save();
  for(let i=_smoke.length-1;i>=0;i--){
    const p=_smoke[i];
    p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.a-=SMOKE.fade;
    if(p.a<=0 || p.r>190){ _smoke.splice(i,1); continue; }
    // blocky NES puff: 3 squares snapped to a 4px grid
    const g=4, s=Math.max(g,Math.round(p.r/g)*g);
    const bx=Math.round(p.x/g)*g, by=Math.round(p.y/g)*g;
    hctx.fillStyle='rgba('+SMOKE.shade+','+SMOKE.shade+','+(SMOKE.shade+8)+','+p.a.toFixed(3)+')';
    hctx.fillRect(bx-s/2,        by-s/2,        s,     s);
    hctx.fillRect(bx-s*0.85,     by-s*0.15,     s*0.6, s*0.6);
    hctx.fillRect(bx+s*0.25,     by-s*0.05,     s*0.55,s*0.55);
  }
  hctx.restore();
}
// === end LAUNCH SMOKE ========================================================

// === NOS / NITROUS BOOST (June 10, 2026) =====================================
// ONE dramatic nitrous hit per race. Press X (or tap the NOS pill) and you get a
// boost EVEN IF you're not holding the gas — for the length of the burst we force
// the engine's gas flag on, so the engine's own boost (which normally needs the
// gas held) fires no matter what. The hit is loud and showy: a shouted "NOS!", the
// car pops up on its rear and swells toward the camera, and a big plume of smoke
// kicks off the back. ANTI-CHEAT: it can only fire ONCE per race — when the burst
// ends we empty the tank (o1=0) so a second press does nothing until the next race
// (the engine refills the tank to full on every race start / retry, and we clear
// the used-flag at those same moments). durMs = how long the burst lasts.
const NOS = { used:false, active:false, t0:0, durMs:1700 };
function _isInRace(){
  const lobbyUp = document.getElementById('lodge-overlay').style.display!=='none';
  return !lobbyUp && typeof race!=='undefined' && race.state===4;   // 4 = actually driving (not the countdown)
}
function fireNOS(){
  if(NOS.used || NOS.active) return;                  // one per race, and no re-trigger mid-burst
  if(!_isInRace() || typeof u1==='undefined' || !u1) return;
  NOS.used=true; NOS.active=true; NOS.t0=Date.now();
  try{ u1.j0(true); u1.s2(true); }catch(e){}          // force gas (q0) + raise the boost flag (l5)
  _nosSpeak(); _nosWhoosh();                           // the drama
}
function endNOS(){
  if(!NOS.active) return;
  NOS.active=false;
  try{ u1.s2(false); }catch(e){}                       // drop the boost flag
  try{ if(!keys['ArrowUp']) u1.j0(false); }catch(e){}  // release gas only if the player isn't actually holding it
  try{ if(typeof u1!=='undefined' && u1) u1.o1=0; }catch(e){}  // empty the tank → locks NOS for the rest of the race
}
function _nosUpdate(){                                  // called every HUD frame
  if(!NOS.active) return;
  if(Date.now()-NOS.t0 > NOS.durMs || !_isInRace()){ endNOS(); return; }
  try{ u1.j0(true); u1.s2(true); }catch(e){}           // hold the burst even if they let go of the key/pill
}
// The NOS shout — plays Edmund's NOS.wav clip. If for some reason it can't play
// (blocked, missing), fall back to browser speech so there's always *something*.
function _nosSpeak(){
  if(!_isInRace()) return;                 // NOS sound ONLY ever plays during an actual race — never on a menu
  try{
    if(_nos){
      _nos.pause(); _nos.currentTime=0; _nos.volume=1;
      const p=_nos.play();
      if(p && p.catch) p.catch(()=>_nosTTS());
      return;
    }
  }catch(e){}
  _nosTTS();
}
function _nosTTS(){
  try{
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance('Noss!');
    u.rate=1.05; u.pitch=0.6; u.volume=1;

    speechSynthesis.speak(u);
  }catch(e){}
}
// Whoosh + low boom, generated live on the screech WebAudio context (no audio file).
function _nosWhoosh(){
  try{
    if(!_sctx){ try{ _screechInit(); }catch(e){} }
    if(!_sctx) return;
    if(_sctx.state==='suspended'){ try{ _sctx.resume().catch(()=>{}); }catch(e){} }
    const t=_sctx.currentTime, dur=0.9;
    // rising filtered-noise whoosh
    const buf=_sctx.createBuffer(1, Math.max(1,Math.floor(_sctx.sampleRate*dur)), _sctx.sampleRate);
    const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=Math.random()*2-1;
    const src=_sctx.createBufferSource(); src.buffer=buf;
    const bp=_sctx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=0.8;
    bp.frequency.setValueAtTime(280,t); bp.frequency.exponentialRampToValueAtTime(4200,t+dur*0.85);
    const g=_sctx.createGain(); g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.28,t+0.07); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);  // subtle under Edmund's clip
    src.connect(bp); bp.connect(g); g.connect(_sctx.destination); src.start(t); src.stop(t+dur);
    // low boom thump under it
    const o=_sctx.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(52,t+0.5);
    const og=_sctx.createGain(); og.gain.setValueAtTime(0.28,t); og.gain.exponentialRampToValueAtTime(0.0001,t+0.55);

// === "NO CLEARANCE" NEAR-MISS BONUS (June 11, 2026) ==========================
// Named after Zhaion's album. Squeeze PAST another car at speed without touching
// it and "NO CLEARANCE" flashes on screen — and you earn back a chunk of NOS.
// This turns the 11 green AI cars from obstacles into the fun (Burnout's trick),
// and gives the one-shot NOS a skill loop: drive dangerously to reload it.
// HOW IT WORKS: every frame we watch each car's signed distance down the track
// (same wrap-aware math as the rubber-banding). The moment a car crosses from
// ahead-of-you to behind-you (you passed it), we check the SIDE gap using the
// same widened "car you actually see" box as the wall collision (visualPad):
//   • boxes overlap            → that was a HIT, no reward
//   • side gap ≤ gapMax        → NEAR MISS! pop + zip sound + NOS refill
//   • anything wider           → just a normal pass, nothing happens
// Three squeezes (per:34) refill the tank (o1 is 0..100 — the NITROUS bar shows
// the progress fill on its own), and a FULL tank unlocks the X button again
// ("NOS RELOADED"). One reward per car per pass (1.2s per-car cooldown), only
// counts at speed (minSpeed), and a near-miss with a full unused tank still pops
// (the flash itself is the reward). Knobs:
//   gapMax   — widest side gap (world units) that still counts as a squeeze
//   minSpeed — fraction of top speed you must be doing (0.55 = 55%)
//   per      — NOS points per near-miss (tank is 100, so 34 ≈ 3 squeezes)
const NEARMISS = { on:true, gapMax:500, minSpeed:0.55, per:34 };   // gapMax loosened 300→500 after live drive: 300 fired ~2×/race even when hunting gaps
let _nmPops=[];
function nearMissTick(){
  if(!NEARMISS.on) return;
  if(typeof cars==='undefined'||!cars||typeof u1==='undefined'||!u1) return;
  if(typeof v3==='undefined'||!v3) return;
  const L=v3.r2(); if(!L) return;
  const now=Date.now();
  const spd=(typeof carSpeed01==='function')?carSpeed01():0;
  const pad=WALL_FEEL.visualPad;                       // match the wall physics: art is wider than the box
  const pL=u1.x-pad/2, pR=u1.x+(u1.width||500)+pad/2;  // the car you SEE (x = left edge)
  for(const c of cars){
    if(c===u1) continue;
    let d=c.z-u1.z; d=((d%L)+L)%L; if(d>L/2)d-=L;      // signed gap down the track, wrap-aware
    const prev=c._nmDz; c._nmDz=d;
    if(prev===undefined) continue;
    if(Math.abs(d)>2500||Math.abs(prev)>2500) continue; // only judge real close-range crossings
    if(!((prev>0&&d<=0)||(prev<0&&d>=0))) continue;     // did we swap places this frame?
    if(now-(c._nmLast||0)<1200) continue;               // one reward per pass per car
    c._nmLast=now;
    if(spd<NEARMISS.minSpeed) continue;                 // crawling past doesn't count
    const cw=c._realW||c.width||500, cL=c.x, cR=cL+cw;
    let gap=-1, side=0;
    if(cL>=pR){ gap=cL-pR; side=1; }                    // squeezed car on your RIGHT
    else if(pL>=cR){ gap=pL-cR; side=-1; }              // squeezed car on your LEFT; <0 = overlap = a hit
    if(gap<0||gap>NEARMISS.gapMax) continue;
    _nearMissAward(side);
  }
}
// JUICE knobs (June 12, 2026): the squeeze should FEEL dangerous — camera punch,
// wind streaks on the side you threaded, accent rim flash, NOS bar gulp.
const NMJUICE = { shakeMs:320, shakeAmp:6, streakMs:480, rimMs:380, gulpMs:550 };
function _nearMissAward(side){
  let sub='', before=0;
  try{
    before=u1.o1||0;
    if(before<100) u1.o1=Math.min(100,before+NEARMISS.per);   // NITROUS bar fills on its own
    if(NOS.used && !NOS.active && u1.o1>=100){ NOS.used=false; sub='NOS RELOADED — HIT X!'; }
    else if(u1.o1>before) sub='+NOS';
  }catch(e){}
  // pre-roll the wind streaks for this squeeze (random lane of sky on that side)
  const streaks=[]; const n=7;
  for(let i=0;i<n;i++) streaks.push({ y:110+Math.random()*430, len:130+Math.random()*230,
                                      w:1.5+Math.random()*3, sp:0.7+Math.random()*0.8 });
  _nmPops.push({t0:Date.now(), sub:sub, side:side||((Math.random()<0.5)?-1:1), streaks:streaks});
  window._nmAwardT=Date.now(); window._nmAwardNOS=!!sub;     // dashboard NITROUS-bar gulp reads this
  _nmZip();
  // LODGE ANNOUNCER (June 12): the squeeze gets a voice. The squeeze that
  // reloads NOS gets its own line; otherwise the two near-miss reads alternate.
  // Shared 9s voice cooldown — the text flash still pops on every squeeze.
  try{
    const _coNow=Date.now();
    if(_coNow-(_coState.nmLast||0)>CALLOUT.nearMissCdMs){
      const _coPlayed = (sub.indexOf('RELOADED')>=0) ? playCallout('nos_reload')
                       : playCallout(_coState.nmFlip?'nearmiss_b':'nearmiss_a');
      if(_coPlayed){ _coState.nmLast=_coNow; _coState.nmFlip=!_coState.nmFlip; }
    }
  }catch(e){}
}
// Camera punch: a quick decaying shake + 1.2% zoom on BOTH canvases (pure CSS
// transform — the engine never knows). Cleared the moment the pops expire.
function _nmShake(){
  const now=Date.now();
  let k=0;
  for(const p of _nmPops){ const el=now-p.t0; if(el<NMJUICE.shakeMs) k=Math.max(k,1-el/NMJUICE.shakeMs); }
  const gc=document.getElementById('gameCanvas'), hc=hctx.canvas;
  if(k>0){
    const dx=Math.sin(now*0.09)*NMJUICE.shakeAmp*k, dy=Math.cos(now*0.07)*(NMJUICE.shakeAmp*0.6)*k;
    const tr='translate('+dx.toFixed(1)+'px,'+dy.toFixed(1)+'px) scale('+(1+0.012*k).toFixed(4)+')';
    if(gc) gc.style.transform=tr;  if(hc) hc.style.transform=tr;
    window._nmShookOn=true;
  } else if(window._nmShookOn){
    if(gc) gc.style.transform='';  if(hc) hc.style.transform='';
    window._nmShookOn=false;
  }
}
// Quick "car blowing past" zip — short falling noise sweep on the screech context.
function _nmZip(){
  try{
    if(!_sctx){ try{ _screechInit(); }catch(e){} }
    if(!_sctx) return;
    if(_sctx.state==='suspended'){ try{ _sctx.resume().catch(()=>{}); }catch(e){} }
    const t=_sctx.currentTime, dur=0.22;
    const buf=_sctx.createBuffer(1, Math.max(1,Math.floor(_sctx.sampleRate*dur)), _sctx.sampleRate);
    const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=Math.random()*2-1;
    const src=_sctx.createBufferSource(); src.buffer=buf;
    const bp=_sctx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.1;
    bp.frequency.setValueAtTime(3800,t); bp.frequency.exponentialRampToValueAtTime(700,t+dur);
    const g=_sctx.createGain(); g.gain.setValueAtTime(0.0001,t);

}
function drawNearMiss(){
  const now=Date.now();

  const accent=(typeof chosenChar!=='undefined'&&chosenChar&&chosenChar.accent)?chosenChar.accent:'#ff3344';

    const ms=now-p.t0, el=ms/900, a=el<0.12?el/0.12:Math.max(0,1-(el-0.12)/0.88);
    // ---- accent rim flash: the screen edges light up in your driver's color ----

function drawPlayerCar(){

                      && (u1.x < -q4 || u1.x+(u1.width||500) > q4);

  if(_bumpT){ const d=Date.now()-_bumpT; if(d<200){ const s=(1-d/200)*_bumpMag*8; shx+=(Math.random()-0.5)*s*2; shy+=(Math.random()-0.5)*s; } }   // bumper-hit shake
  if(_onShoulder && spd>0.05){ shx+=(Math.random()-0.5)*6; shy+=(Math.random()-0.5)*3; }   // rumble-strip judder

  let h=PLAYER_CAR.height;
  let w=img.naturalWidth/img.naturalHeight*h;

    nosLift=18*pop;          // rises ~18px then settles back

// Motion-blur streaks over the rear tires (just above the HUD bar) — reads as
// spinning wheels / ground speed. Only while moving.
function drawWheelSpin(x, w, spd){
  const wheels=[x+w*0.115, x+w*0.885];     // approx rear-tire centers
  const topY=626, botY=658, span=botY-topY;
  hctx.save();
  hctx.lineCap='round'; hctx.lineWidth=3;

    for(let k=0;k<3;k++){

      hctx.strokeStyle='rgba(235,235,255,'+(0.15+spd*0.45).toFixed(3)+')';
      hctx.beginPath();
      hctx.moveTo(wx-w*0.05, sy);
      hctx.lineTo(wx+w*0.05, sy);
      hctx.stroke();
    }
  }
  hctx.restore();
}

// --- On-screen control pad (mobile-style): glows when you press the arrow keys ---
function _roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
// Desktop key hints on the pad: stamp each button's keyboard key in its corner so
// mouse/keyboard players know what to press. Touch players tap, so these show on
// desktop only (pointer:fine). Driven off the same zone data the pad already builds.
const _showKeyHints = !(window.matchMedia && matchMedia('(pointer:coarse)').matches);
function _keyGlyph(z){
  if(!z) return '';
  switch(z.code){
    case 'ArrowUp':return '\u2191'; case 'ArrowDown':return '\u2193';
    case 'ArrowLeft':return '\u2190'; case 'ArrowRight':return '\u2192';
    case 'KeyX':return 'X'; case 'KeyZ':return 'Z';
  }

}
function _keyCap(x,y,glyph){
  if(!_showKeyHints || !glyph) return;
  const w=22,h=18;
  hctx.save();
  _roundRect(hctx,x,y,w,h,4);
  hctx.fillStyle='rgba(255,255,255,0.92)'; hctx.fill();
  hctx.lineWidth=1; hctx.strokeStyle='rgba(0,0,0,0.35)'; hctx.stroke();
  hctx.fillStyle='#0c0c14'; hctx.font='bold 12px monospace';
  hctx.textAlign='center'; hctx.textBaseline='middle';
  hctx.fillText(glyph, x+w/2, y+h/2+1);
  hctx.restore();
}

// v2 (June 8, 2026): tappable + "pro" restyle — glassy dark buttons with a glass
// top-highlight, soft drop shadow, color-coded glow on press (steering/DRIFT =
// driver accent, GAS green, BRAKE red, NOS electric blue), a press-in pop, and
// always-on color hint strips so the pad reads designed even at idle. NOS (X)
// and DRIFT (Z) pills sit above the pedals/steering so phones get every control.
function _ctrlBase(x,y,w,h,r,pressed,col){
  hctx.shadowColor='rgba(0,0,0,0.55)'; hctx.shadowBlur=14; hctx.shadowOffsetY=5;   // lift off the road
  _roundRect(hctx,x,y,w,h,r);
  const g=hctx.createLinearGradient(0,y,0,y+h);
  if(pressed){ hctx.shadowColor=col; hctx.shadowBlur=30; hctx.shadowOffsetY=0;     // neon glow when held
    g.addColorStop(0,col); g.addColorStop(1,'#0c0c14'); }
  else { g.addColorStop(0,'rgba(46,46,62,0.88)'); g.addColorStop(1,'rgba(10,10,16,0.88)'); }
  hctx.fillStyle=g; hctx.fill();
  hctx.shadowBlur=0; hctx.shadowOffsetY=0;
  _roundRect(hctx,x+3,y+3,w-6,h*0.42,Math.min(r-2,14));                            // glass highlight
  const hg=hctx.createLinearGradient(0,y,0,y+h*0.5);
  hg.addColorStop(0,'rgba(255,255,255,'+(pressed?0.35:0.15)+')'); hg.addColorStop(1,'rgba(255,255,255,0)');
  hctx.fillStyle=hg; hctx.fill();

  hctx.lineWidth=pressed?2.5:1.5;
  hctx.strokeStyle=pressed?'#ffffff':'rgba(255,255,255,0.28)';
  hctx.stroke();
}
function _ctrlBtn(x,y,s,dir,label,pressed,col,zone){
  if(zone){ zone.x=x; zone.y=y; zone.w=s; zone.h=s; window._padZones.push(zone); }
  hctx.save();
  const inset=pressed?3:0, bx=x+inset, by=y+inset, bs=s-inset*2;                   // press-in pop
  _ctrlBase(bx,by,bs,bs,18,pressed,col);
  _roundRect(hctx,bx+16,by+bs-9,bs-32,4,2);                                        // color hint strip
  hctx.fillStyle=col; hctx.globalAlpha=pressed?1:0.55; hctx.fill(); hctx.globalAlpha=1;
  const cx=bx+bs/2, cy=by+bs/2-8, a=bs*0.16;                                       // double chevron icon
  hctx.strokeStyle=pressed?'#ffffff':'rgba(255,255,255,0.85)';
  hctx.lineWidth=6.5; hctx.lineCap='round'; hctx.lineJoin='round';
  const ch=o=>{ hctx.beginPath();
    if(dir==='left'){ hctx.moveTo(cx+a*0.55+o,cy-a); hctx.lineTo(cx-a*0.55+o,cy); hctx.lineTo(cx+a*0.55+o,cy+a); }
    else if(dir==='right'){ hctx.moveTo(cx-a*0.55+o,cy-a); hctx.lineTo(cx+a*0.55+o,cy); hctx.lineTo(cx-a*0.55+o,cy+a); }
    else if(dir==='up'){ hctx.moveTo(cx-a,cy+a*0.55+o); hctx.lineTo(cx,cy-a*0.55+o); hctx.lineTo(cx+a,cy+a*0.55+o); }
    else { hctx.moveTo(cx-a,cy-a*0.55+o); hctx.lineTo(cx,cy+a*0.55+o); hctx.lineTo(cx+a,cy-a*0.55+o); }
    hctx.stroke(); };
  ch(-6); ch(7);
  hctx.fillStyle=pressed?'#ffffff':'rgba(255,255,255,0.75)';
  hctx.font='bold 12px monospace'; hctx.textAlign='center';
  hctx.fillText(label,bx+bs/2,by+bs-16);
  _keyCap(bx+8,by+8,_keyGlyph(zone));        // desktop: stamp the key in the corner
  hctx.restore();
}
function _ctrlPill(x,y,w,h,label,pressed,col,zone){
  if(zone){ zone.x=x; zone.y=y; zone.w=w; zone.h=h; window._padZones.push(zone); }
  hctx.save();
  const inset=pressed?2:0, bx=x+inset, by=y+inset, bw=w-inset*2, bh=h-inset*2;
  _ctrlBase(bx,by,bw,bh,bh/2,pressed,col);
  hctx.fillStyle=pressed?'#ffffff':'rgba(255,255,255,0.85)';
  hctx.font='bold 17px monospace'; hctx.textAlign='center';
  hctx.fillText(label,bx+bw/2,by+bh/2+6);
  _keyCap(bx+12,by+(bh-18)/2,_keyGlyph(zone));   // desktop: stamp the key on the left
  hctx.restore();
}
function drawControls(accent){
  window._padZones.length=0;                       // zones rebuilt every frame, so they always match the art
  const S=104, gap=14, y=556, py=492, ph=50;
  // bottom-left: steering (driver accent) + DRIFT pill
  _ctrlPill(34, py, S*2+gap, ph, 'DRIFT', !!keys['KeyZ'], accent, {key:'z',code:'KeyZ',kc:90});
  _ctrlBtn(34,       y, S, 'left',  'LEFT',  !!keys['ArrowLeft'],  accent, {key:'ArrowLeft',code:'ArrowLeft',kc:37});
  _ctrlBtn(34+S+gap, y, S, 'right', 'RIGHT', !!keys['ArrowRight'], accent, {key:'ArrowRight',code:'ArrowRight',kc:39});
  // bottom-right: pedals (GAS green / BRAKE red) + NOS pill (electric blue)
  const gx=1024-34-S, bx=gx-S-gap;
  _ctrlPill(bx, py, S*2+gap, ph, '⚡ NOS', !!keys['KeyX'], '#22aaff', {key:'x',code:'KeyX',kc:88});
  _ctrlBtn(bx, y, S, 'down', 'BRAKE', !!keys['ArrowDown'], '#ff4433', {key:'ArrowDown',code:'ArrowDown',kc:40});
  _ctrlBtn(gx, y, S, 'up',   'GAS',   !!keys['ArrowUp'],   '#33dd55', {key:'ArrowUp',code:'ArrowUp',kc:38});
}

// === BRITISH RACE ANNOUNCER (June 8, 2026) ===================================
// Posh British girl on the PA: "Lap one, completed." when you cross the line,
// "Race, decided." at the flag. Uses the browser's built-in speech voices —
// prefers known UK female voices, falls back to any en-GB. The ENGINE has its
// own speak() that tries to announce "lap time"/"Race. Over." — we replace it
// below so the two announcers never talk over each other.
const ANNOUNCER_ON = true;
const ANNOUNCER = {
  pitch: 1.08, rate: 0.95, volume: 1.0,
  prefer: ['Google UK English Female','Kate','Serena','Martha','Stephanie','Sonia','Shelley (English (UK))'],
  // iOS ships ancient robot/novelty voices that register as British English —
  // one of these grabbed the mic on Edmund's iPhone test. Never let them speak.
  block: ['Eddy','Flo','Grandma','Grandpa','Reed','Rocko','Sandy','Shelley (English (US))',
          'Albert','Bahh','Bells','Boing','Bubbles','Cellos','Wobble','Zarvox','Trinoids',
          'Organ','Good News','Bad News','Jester','Junior','Kathy','Whisper','Superstar','Ralph','Fred']
};
let _annVoices=[];                                       // cached list — iPhones load voices LATE (async)
function _annLoadVoices(){ try{ _annVoices = speechSynthesis.getVoices()||[]; }catch(e){} }
if(window.speechSynthesis){
  _annLoadVoices();
  speechSynthesis.addEventListener && speechSynthesis.addEventListener('voiceschanged', _annLoadVoices);
}
function _annVoice(){
  if(!_annVoices.length) _annLoadVoices();
  const ok = v => !ANNOUNCER.block.some(b=>v.name.indexOf(b)>=0);
  for(const n of ANNOUNCER.prefer){                      // 1) a known good UK female voice
    const v = _annVoices.find(v=>v.name.indexOf(n)>=0 && ok(v));
    if(v) return v;
  }
  const gb = _annVoices.filter(v=>(v.lang||'').replace('_','-').toLowerCase().startsWith('en-gb') && ok(v));
  return gb.find(v=>/premium|enhanced/i.test(v.name))    // 2) best non-robot British voice available
      || gb[0]
      || _annVoices.find(v=>(v.lang||'').toLowerCase().startsWith('en') && ok(v))   // 3) any decent English
      || null;
}
function announce(t){
  if(!ANNOUNCER_ON || !window.speechSynthesis) return;
  try{
    const u=new SpeechSynthesisUtterance(t);
    const v=_annVoice(); if(v) u.voice=v;
    u.pitch=ANNOUNCER.pitch; u.rate=ANNOUNCER.rate; u.volume=ANNOUNCER.volume;
    speechSynthesis.cancel();                       // announcements never stack
    speechSynthesis.speak(u);
  }catch(e){}
}
let _lastRawLap=0;
function announcerTick(){                            // called from hudTick while racing
  if(typeof u1==='undefined'||!u1||typeof u1.lap!=='number') return;
  if(u1.lap===2 && _lastRawLap===1) announce('Lap one, completed.');
  _lastRawLap=u1.lap;
}
// Silence the engine's own announcer (it tried to say "lap time" / "Race. Over." /
// countdown chatter) — our British girl + the starter girl own the mic now.
if(typeof speak==='function'){ speak=function(){}; }
// === end BRITISH RACE ANNOUNCER ==============================================

// === LODGE ANNOUNCER RACE CALL-OUTS (June 12, 2026) ==========================
// The hype man now calls the race. Real ElevenLabs clips of the Lodge Announcer
// (the warning/unlock-video voice) fire on race moments, Daytona-style. The
// BRITISH GIRL KEEPS laps + countdown + "race decided" — he's the color guy on
// top, she's the official. Approved line bank: audio/announcer/callout_*.wav
// (dev .wav / deploy .mp3, same swap rule as all audio). Sheet + verdicts:
// source-art/announcer_callout_lines.md.
// RULES: he NEVER talks over himself (skip if busy), near-miss lines share a
// 9s voice cooldown (the text flash still pops every squeeze), TAKE-THE-LEAD
// fires once per race and only after the field sorts out, the finish line is
// delayed a beat so the girl's "Race, decided." lands first. While he speaks
// the race music DUCKS to duckVol and pops back when he's done. A missing/
// blocked clip just restores the music — never breaks the race. Zero engine
// edits: hooks live in hudTick's GO branch, _nearMissAward, captureFinish,
// and calloutTick (per-frame, next to announcerTick).
const CALLOUTS_ON = true;            // master switch for the whole voice bank
const CALLOUT_SRC = {
  start_lodge:'audio/announcer/callout_we_on_the_lodge.mp3',   // L1 race start (right after GO)
  nearmiss_a:'audio/announcer/callout_no_clearance.mp3',       // squeeze (signature)
  nearmiss_b:'audio/announcer/callout_aint_even_touch_him.mp3',// squeeze (variant, alternates)
  nos_reload:'audio/announcer/callout_nos_reloaded.mp3',       // the squeeze that refills the tank
  take_lead:'audio/announcer/callout_there_goes_your_leader.mp3', // you take 1st
  win:'audio/announcer/callout_you_did_it_detroit.mp3',        // comfortable win
  bumper:'audio/announcer/callout_by_a_bumper.mp3'             // photo finish (top 2, tight gap)
};
const CALLOUT = {
  duckVol:0.25,        // race music volume while he speaks
  raceVol:0.8,         // race music volume to restore (matches the fade-in target)
  nearMissCdMs:9000,   // min gap between near-miss family lines
  leadAfterMs:5000,    // take-the-lead armed only this long after the start (field sorted)
  bumperGap:1200,      // world units to the adjacent car at the flag = "BY A BUMPER"
  startDelayMs:650,    // beat after GO before the start line (don't step on the launch)
  winDelayMs:1200      // beat after the flag (the girl's "Race, decided." goes first)
};
const _coAud={};
for(const k in CALLOUT_SRC){ try{ const a=new Audio(CALLOUT_SRC[k]); a.preload='auto'; a.volume=1; _coAud[k]=a; }catch(e){} }
let _coState={ nmLast:0, nmFlip:false, leadDone:false, finishDone:false, prevPos:99 };
function _coReset(){ _coState={ nmLast:0, nmFlip:false, leadDone:false, finishDone:false, prevPos:99 }; }
function _coBusy(){ for(const k in _coAud){ const a=_coAud[k]; if(a && !a.paused && !a.ended) return true; } return false; }
function _coDuck(on){
  try{
    clearInterval(_raceFadeInt);                     // never fight the race-music fade-in
    _race.volume = on ? CALLOUT.duckVol : CALLOUT.raceVol;
  }catch(e){}
}
function playCallout(key){
  if(!CALLOUTS_ON) return false;
  const a=_coAud[key]; if(!a) return false;
  if(_coBusy()) return false;                        // he never talks over himself
  try{
    a.currentTime=0; a.volume=1;
    _coDuck(true);
    a.onended=()=>_coDuck(false);
    const p=a.play();
    if(p&&p.catch) p.catch(()=>_coDuck(false));      // blocked/missing clip → just give the music back
    return true;
  }catch(e){ _coDuck(false); return false; }
}
// Per-frame watch (called from hudTick while racing): TAKE THE LEAD — once per
// race, only after leadAfterMs so the start-line position shuffle can't fake it.
function calloutTick(){
  if(!CALLOUTS_ON || typeof u1==='undefined' || !u1) return;
  const pos=(u1.position>0)?u1.position:99;
  const armed=_raceStartTime>0 && (Date.now()-_raceStartTime)>CALLOUT.leadAfterMs;
  if(!_coState.leadDone && armed && _coState.prevPos>1 && pos===1){
    if(playCallout('take_lead')) _coState.leadDone=true;
  }
  _coState.prevPos=pos;
}

// === RESULTS-SCREEN ENGINE CUT (June 12, 2026) ===============================
// On the finish screen the car's idle hum (a ScriptProcessor inside
// engine.min.js: node f6 -> gain f5 at 0.14 -> speakers) kept rumbling under
// the race music — Edmund: "the engine is still running and you can't hear
// the music well." Fix WITHOUT touching the engine: zero that gain node while
// the results screen is up, put it back for the next race. We save the
// engine's own value the first time we mute (0.14 today — future-proof if the
// engine ever changes it). Muted every frame of state 5 (idempotent), restored
// on the state-5 exit (Z-retry / advance) AND at the GO launch.
let _engGainSaved=null;
function _engineMute(on){
  try{
    if(typeof f5==='undefined'||!f5||!f5.gain) return;
    if(on){ if(_engGainSaved===null) _engGainSaved=f5.gain.value; f5.gain.value=0; }
    else if(_engGainSaved!==null){ f5.gain.value=_engGainSaved; }
  }catch(e){}
}

// === TIRE SCREECH on hard steering (June 7, 2026) ============================
// Steering left/right AT SPEED plays a tire-screech (synthesized — band-passed
// noise, no audio file needed; reads like the NES noise channel). No screech at
// low speed: crawling through traffic shouldn't squeal. Louder + slightly
// higher-pitched the faster you're going. Switch: SCREECH_ON. Knobs: SCREECH.
// v2 (Edmund's notes): LOUDER, and an animated cartoon "SKRRT!" — a high squeal
// that dive-bombs in pitch every time you flick the wheel, with a fast wobble
// (vibrato) while you hold the turn. Tone + a little noise underneath for tire
// texture. Sits at 1.2-2kHz so it cuts through the race music instead of
// hiding under it.
const SCREECH_ON = true;
const SCREECH = {
  minSpd:      0.45,  // 0..1 of top speed — below this, steering is silent
  vol:         0.40,  // peak loudness (0.20 was inaudible over music; 0.50 a touch much)
  pitchHi:     1850,  // Hz — where the SKRRT attack starts...
  pitchLo:     1280,  // Hz — ...and dives to (the held squeal pitch)
  wobbleHz:    33,    // vibrato speed — the "animated" warble
  wobbleDepth: 170,   // vibrato width in Hz
  noiseMix:    0.65,  // 0..1 — how much tire-noise vs squeal tone (0.35 = mostly squeal; 0.65 = the rubbery tire-rub version)
  fadeIn:      0.03,  // seconds to ramp up when you start turning
  fadeOut:     0.10   // seconds to die off when you straighten out
};
let _sctx=null,_scGain=null,_scOsc=null,_scOn=false;
function _screechInit(){
  if(_sctx) return;
  try{
    _sctx=new (window.AudioContext||window.webkitAudioContext)();
    _scGain=_sctx.createGain(); _scGain.gain.value=0; _scGain.connect(_sctx.destination);
    // the squeal: sawtooth tone with a vibrato LFO wobbling its pitch
    _scOsc=_sctx.createOscillator(); _scOsc.type='sawtooth'; _scOsc.frequency.value=SCREECH.pitchLo;
    const oscBP=_sctx.createBiquadFilter(); oscBP.type='bandpass'; oscBP.frequency.value=1500; oscBP.Q.value=1.2;
    const oscG=_sctx.createGain(); oscG.gain.value=1-SCREECH.noiseMix;
    _scOsc.connect(oscBP); oscBP.connect(oscG); oscG.connect(_scGain);
    const lfo=_sctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=SCREECH.wobbleHz;
    const lfoG=_sctx.createGain(); lfoG.gain.value=SCREECH.wobbleDepth;
    lfo.connect(lfoG); lfoG.connect(_scOsc.frequency);
    // tire-noise bed underneath
    const len=_sctx.sampleRate;
    const buf=_sctx.createBuffer(1,len,_sctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    const nz=_sctx.createBufferSource(); nz.buffer=buf; nz.loop=true;
    const nzBP=_sctx.createBiquadFilter(); nzBP.type='bandpass'; nzBP.frequency.value=1300; nzBP.Q.value=4;
    const nzG=_sctx.createGain(); nzG.gain.value=SCREECH.noiseMix;
    nz.connect(nzBP); nzBP.connect(nzG); nzG.connect(_scGain);
    _scOsc.start(); lfo.start(); nz.start();
  }catch(e){ _sctx=null; }
}
function updateScreech(spd01, steering){
  if(!SCREECH_ON) return;
  const want = steering && spd01>SCREECH.minSpd;
  if(want && !_sctx) _screechInit();
  if(!_sctx || !_scGain) return;
  if(_sctx.state==='suspended'){ try{_sctx.resume().catch(()=>{});}catch(e){} }
  const t=_sctx.currentTime;
  const v=SCREECH.vol*Math.min(1, 0.45+(spd01-SCREECH.minSpd)/(1-SCREECH.minSpd));
  if(want && !_scOn){
    // the SKRRT attack: pitch dive-bombs on every fresh flick of the wheel
    try{
      _scOsc.frequency.cancelScheduledValues(t);
      _scOsc.frequency.setValueAtTime(SCREECH.pitchHi+spd01*150, t);
      _scOsc.frequency.exponentialRampToValueAtTime(SCREECH.pitchLo+spd01*120, t+0.16);
    }catch(e){}
    _scGain.gain.setTargetAtTime(v, t, SCREECH.fadeIn);
    _scOn=true;
  } else if(want){
    _scGain.gain.setTargetAtTime(v, t, 0.08);          // track speed while holding the turn
  } else if(_scOn){
    _scGain.gain.setTargetAtTime(0, t, SCREECH.fadeOut);
    _scOn=false;
  }
}
// === end TIRE SCREECH ========================================================

// --- READY / SET / GO starter girl, timed to the engine countdown ---
// Engine countdown: state 0 = "RACE [n]" intro (f0 4->0), then state 1 = the
// 3-2-1 (f0 = 3,2,1) at 800ms/step, then state 4 = racing. We map:
//   state 1 f0=3 -> READY,  f0=2 -> SET,  f0<=1 -> GO,  then a brief GO hold.
let _starterWord=null, _starterWordSince=0, _prevRaceState=-1, _goHoldStart=0;

function currentStarter(){
  if(typeof race==='undefined') return null;
  const st=race.state, f=race.f0;
  if(st===0) return {pose:'READY', word:null};            // on the line during intro
  if(st===1){
    if(f>=3) return {pose:'READY', word:'READY'};
    if(f===2) return {pose:'SET',  word:'SET'};
    return {pose:'GO', word:'GO!'};                        // f0 <= 1
  }
  if(st===4 && _goHoldStart && (Date.now()-_goHoldStart)<900)
    return {pose:'GO', word:'GO!'};                        // hold GO into the launch
  return null;
}

function drawStarter(accent){
  const s=currentStarter(); if(!s) return;
  if(s.word!==_starterWord){ _starterWord=s.word; _starterWordSince=Date.now(); }

  const CW=300, CH=400, X=512-CW/2, Y=58;

  // fade the whole card out as the GO hold ends
  let alpha=1;
  if(race.state===4 && _goHoldStart){
    const e=Date.now()-_goHoldStart;
    alpha = e<550 ? 1 : Math.max(0,(900-e)/350);
  }
  if(alpha<=0) return;

  // pop on each new word/pose (1.18 -> 1.0 over 260ms)
  const since=Date.now()-_starterWordSince;
  const pop = since<260 ? 1 + 0.18*(1-since/260) : 1;

  hctx.save();
  hctx.globalAlpha=alpha;

  // backing card
  _roundRect(hctx,X,Y,CW,CH,22);
  hctx.fillStyle='rgba(6,0,14,0.80)'; hctx.fill();
  hctx.lineWidth=2.5; hctx.strokeStyle=accent;
  hctx.shadowColor=accent; hctx.shadowBlur=26; hctx.stroke();
  hctx.shadowBlur=0;

  // girl (anchored to a fixed baseline inside the card, scaled by the pop)
  const img=starterImgs[s.pose];
  if(img && img.naturalWidth){
    let gh=270, gw=img.naturalWidth/img.naturalHeight*gh;
    const maxW=CW-46;
    if(gw>maxW){ gw=maxW; gh=img.naturalHeight/img.naturalWidth*gw; }
    hctx.save();
    hctx.translate(512, 384);
    hctx.scale(pop,pop);
    hctx.drawImage(img, -gw/2, -gh, gw, gh);
    hctx.restore();
  }

  // word
  if(s.word){
    const isGo = s.word.charAt(0)==='G';
    hctx.textAlign='center';
    hctx.font='bold '+Math.round((isGo?84:66)*pop)+'px monospace';
    hctx.fillStyle = isGo ? '#2bff6b' : '#ffffff';
    hctx.shadowColor = isGo ? '#2bff6b' : accent;
    hctx.shadowBlur = isGo ? 30 : 18;

// ===================== THE RETRY LOOP PACK (June 7, 2026) =====================
// Four small features that make a short promo game replayable, cheapest-first:
//  1. BEST TIMES + NEW RECORD  — per-driver best race time saved in the browser
//  2. RIVAL RUBBER-BANDING     — rivals breathe with you so every finish is close
//  3. DRAFT! + PASS pops       — mid-race juice; teaches the engine's hidden slipstream
//  4. PHOTO-FINISH PANEL       — branded results screen w/ gaps to each rival + album CTA
const RUBBER = { far:6000, ease:0.95, push:1.05, cap:20600 };   // cap stays under your cruise
let _finish={done:false}, _lastPosSeen=0, _pops=[], _finishShownAt=0;

function rubberBandRivals(){
  if(typeof v3==='undefined'||!v3||typeof u1==='undefined'||!u1||!_rivals.length) return;
  const L=v3.r2();
  for(const r of _rivals){
    const b=r.car._baseR6||r.car.r6; if(!b) continue;
    let d=r.car.z-u1.z; d=((d%L)+L)%L; if(d>L/2)d-=L;     // signed gap, wrap-aware
    if(d>RUBBER.far)       r.car.r6=b*RUBBER.ease;                 // way ahead: breathe
    else if(d<-RUBBER.far) r.car.r6=Math.min(b*RUBBER.push,RUBBER.cap); // behind: charge (capped)
    else                   r.car.r6=b;                              // close: race honest
  }
}

function trackPasses(){
  if(typeof u1==='undefined'||!u1||!(u1.position>0)) return;
  if(_lastPosSeen===0){ _lastPosSeen=u1.position; return; }       // settle silently at start
  if(u1.position<_lastPosSeen){
    _pops.push({txt:'+'+(_lastPosSeen-u1.position)+'  '+u1.n2().toUpperCase(), t0:Date.now()});
  }
  _lastPosSeen=u1.position;
}

function drawPops(){
  const now=Date.now();
  _pops=_pops.filter(p=>now-p.t0<1000);
  for(const p of _pops){
    const el=(now-p.t0)/1000, a=el<0.15?el/0.15:Math.max(0,1-(el-0.15)/0.85);
    hctx.save(); hctx.globalAlpha=a;
    hctx.font='bold 28px monospace'; hctx.textAlign='center';
    hctx.shadowColor='rgba(0,0,0,0.9)'; hctx.shadowBlur=8;
    hctx.fillStyle='#7CFC9A';
    hctx.fillText(p.txt, 512, 215-el*45);
    hctx.restore(); hctx.globalAlpha=1; hctx.textAlign='left';
  }
}

function drawDraftBadge(){
  if(typeof u1==='undefined'||!u1||!(u1.h2>0)) return;            // engine: slipstream active
  const pulse=0.75+0.25*Math.sin(Date.now()/90);
  hctx.save(); hctx.textAlign='center';

  hctx.shadowColor='#66e0ff'; hctx.shadowBlur=18*pulse;
  hctx.fillStyle='rgba(150,235,255,'+(0.65+0.35*pulse).toFixed(2)+')';

function _fmtT(ms){
  const m=Math.floor(ms/60000), s=((ms%60000)/1000);
  return m+':'+(s<10?'0':'')+s.toFixed(1);

function captureFinish(){
  _finish={done:true, ms:Date.now()-_raceStartTime, rivals:[]};
  _finishShownAt=Date.now();                          // grace clock for "back to start" (below)
  try{ const gc=document.getElementById('gameCanvas'); if(gc) gc.style.transform='';
       if(typeof hctx!=='undefined'&&hctx.canvas) hctx.canvas.style.transform='';
       window._nmShookOn=false; }catch(e){}           // never leave a near-miss shake frozen on the results screen
  try{ _finish.pos=(u1.g5&&typeof u1.g5==='string')?u1.g5:u1.n2(); }catch(e){ _finish.pos=''; }
  _finish.win=_finish.pos==='1st';
  _finish.top2=(_finish.pos==='1st'||_finish.pos==='2nd');   // EDMUND'S RULE (June 12): top 2 advances to the next level
  _finish.level=levelIdx;                                     // which level this finish belongs to
  const key='lodge_best_'+(levelIdx>0?('L'+(levelIdx+1)+'_'):'')+(chosenChar?chosenChar.name.replace(/\s+/g,'_'):'X');  // per-LEVEL bests (L1 keeps the original key so old records survive)
  let prev=null; try{ prev=parseInt(localStorage.getItem(key)||'',10)||null; }catch(e){}
  _finish.newRecord=!prev||_finish.ms<prev;
  _finish.best=_finish.newRecord?_finish.ms:prev;
  if(_finish.newRecord){ try{ localStorage.setItem(key,''+_finish.ms); }catch(e){} }
  try{
    const L=v3.r2();
    for(const r of _rivals){
      let d=r.car.z-u1.z; d=((d%L)+L)%L; if(d>L/2)d-=L;
      _finish.rivals.push({name:r.ch.name, accent:r.ch.accent||'#fff',
        ord:r.car.n2(), ahead:r.car.position<u1.position, gap:Math.abs(d)/20800});
    }
    _finish.rivals.sort((a,b)=>(a.ahead===b.ahead)?a.gap-b.gap:(a.ahead?-1:1));
  }catch(e){}
  try{ _finish.board=cars.map(c=>({place:c.position||0, idx:c.index})).sort((a,b)=>(a.place||99)-(b.place||99)); }catch(e){ _finish.board=[]; }
  // ARCADE TOP-10 (June 12, 2026): if this time makes the level's local board,
  // pop the 3-letter initials picker on the results screen (last initials prefilled).
  try{
    if(_topQualifies(levelIdx,_finish.ms)){
      // ARCADE WAY (June 14): no mid-run picker. Bank the best qualifying time per level;
      // initials are entered ONCE at the END of the run (see _endRun / _startRunInitials).
      if(!(levelIdx in _pendingBoards) || _finish.ms<_pendingBoards[levelIdx]) _pendingBoards[levelIdx]=_finish.ms;
      _finish.madeBoard=true;
    } else _finish.madeBoard=false;
  }catch(e){ _finish.madeBoard=false; }
  _init=null;   // no mid-run picker
  // LODGE ANNOUNCER (June 12): the flag gets a voice. A top-2 finish within
  // bumperGap of the adjacent car = "BY A BUMPER!"; otherwise a win gets the
  // Detroit stand-up. Delayed a beat so the girl's "Race, decided." goes first.
  try{
    if(!_coState.finishDone){
      _coState.finishDone=true;
      let _coKey=null;
      if(_finish.top2){
        let _coGap=Infinity;
        try{
          const L=v3.r2();
          const want=(u1.position===1)?2:1;            // 1st: gap to 2nd · 2nd: gap to the winner
          for(const c of cars){
            if(c===u1 || (c.position||0)!==want) continue;
            let d=c.z-u1.z; d=((d%L)+L)%L; if(d>L/2)d-=L;
            _coGap=Math.min(_coGap,Math.abs(d));
          }
        }catch(e){}
        if(_coGap<CALLOUT.bumperGap) _coKey='bumper';
      }
      if(!_coKey && _finish.win) _coKey='win';
      if(_coKey) setTimeout(()=>{ try{ playCallout(_coKey); }catch(e){} }, CALLOUT.winDelayMs);
    }
  }catch(e){}
}

// === FINISH SCREEN: LEVEL PROGRESSION + BACK TO START (June 12, 2026) =========
// EDMUND'S RULE: finish TOP 2 on the Lodge and you advance to Belle Isle.
// Anything less, you run it back. How the finish screen routes input now:
//   • Z                       — engine retry of the same race (always, both levels)
//   • TOP 2 on the Lodge      — X, ANY other key, or a TAP → launchRace(1) = Belle
//                               Isle (same verified path as the dev `2` shortcut).
//                               This finally works on PHONES (tap = advance) and
//                               for 2nd place (the engine's own X was 1st-only).
//   • 3rd or worse on Lodge   — any key/tap → back to start; X does nothing.
//   • Belle Isle (any place)  — any key/tap → back to start. X is BLOCKED from
//                               the engine here, which kills the old dead end
//                               (engine X used to dump you on an unthemed spare
//                               track). Panel teases the downtown finale instead.
// X is intercepted in the CAPTURE phase so the engine's own next-race handler
// never sees it — all advancement now goes through launchRace(1), one code path.
// Guards kept from the June 8 version: grace window + held-key auto-repeat ignore.
const FINISH_BACK_GRACE_MS = 1200;
function _atFinish(){
  return typeof race!=='undefined' && race.state===5 && _finish && _finish.done
         && _finishShownAt && (Date.now()-_finishShownAt) > FINISH_BACK_GRACE_MS;
}
function _startOver(){ _reloadClean(); }   // silence the race song BEFORE reload (no carryover into the lobby)
function _canAdvance(){ return _finish && _finish.done && _finish.top2 && _finish.level<2; }   // Lodge→Belle, Belle→Downtown; Downtown is the finale
function _advanceLevel(){
  if(_finish && _finish.level===1){ if(L3_CINEMATIC_ON) startLevel3Cinematic(); else launchRace(2); return; }   // Belle → Downtown (unlock video; failure paths land on launchRace(2))
  if(L2_CINEMATIC_ON) startLevel2Cinematic(); else launchRace(1);   // Lodge → Belle (unlock video; failure paths land on launchRace(1))
}
window.addEventListener('keydown', e=>{
  const finUp = typeof race!=='undefined' && race.state===5 && _finish && _finish.done;
  if(!finUp) return;
  // UNLOCK CINEMATIC is up: eat EVERY key (the engine must not see Z/X while the
  // video plays — race.state is still 5 underneath). Any key = try the skip,
  // same 2s lock as the other intros.
  if(_l2cine||_l3cine||_outro){ e.stopPropagation(); e.preventDefault(); if(!e.repeat) _introTrySkip(); return; }
  // INITIALS PICKER eats EVERY key while it's up (even during the grace window),
  // so a habit-press of Z can't restart the race mid-entry. Engine never sees them.
  if(_init && _init.on){
    if(e.metaKey||e.ctrlKey||e.altKey) return;         // leave browser shortcuts alone
    e.stopPropagation(); e.preventDefault();
    if(e.code==='Escape'){ if(!e.repeat) _initSkip(); return; }
    if(e.code==='Enter'||e.code==='NumpadEnter'){ if(!e.repeat) _initLock(); return; }
    if(e.code==='ArrowUp'){ _initCycle(1); return; }   // repeat allowed: hold to spin letters
    if(e.code==='ArrowDown'){ _initCycle(-1); return; }
    if(e.code==='ArrowLeft'){ _init.slot=(_init.slot+2)%3; return; }
    if(e.code==='ArrowRight'){ _init.slot=(_init.slot+1)%3; return; }
    const m=/^Key([A-Z])$/.exec(e.code), d=/^Digit([0-9])$/.exec(e.code);   // direct typing
    if(m||d){ _init.letters[_init.slot]=m?m[1]:d[1]; _init.slot=Math.min(_init.slot+1,2); try{_navClick();}catch(_e){} }
    return;
  }
  if(!_atFinish() || e.repeat) return;                 // e.repeat = key held since the race; ignore
  if(_decisionUp) return;                              // the decision screen handles its own keys
  if(e.metaKey||e.ctrlKey||e.altKey) return;           // leave browser shortcuts (Cmd+R etc.) alone
  if(e.code==='KeyS'){                                 // S = share the result card (still on the results screen)
    e.stopImmediatePropagation(); e.preventDefault(); _shareResult(); return;
  }
  // any other key opens the big, readable decision screen (continue / retry / menu)
  e.stopImmediatePropagation(); e.preventDefault();
  _showDecision();
}, true);
window.addEventListener('pointerup', e=>{
  if(!e.isTrusted) return;
  const finUp = typeof race!=='undefined' && race.state===5 && _finish && _finish.done;
  if(!finUp) return;
  // ALWAYS consume finish-screen taps (even inside the grace window) — otherwise
  // the engine's own canvas handler sees the tap and silently restarts the race.
  e.stopPropagation(); e.preventDefault();
  if(_l2cine||_l3cine||_outro){ _introTrySkip(); return; }   // tap during a cinematic/outro = try the skip, nothing else
  const p=_toHud(e);
  if(_init && _init.on){                               // picker taps: letters / lock / skip
    e.stopPropagation(); e.preventDefault();
    const z=_finZoneAt(p.x,p.y); if(!z) return;
    if(z.act==='up') _initCycleAt(z.idx,1);
    else if(z.act==='down') _initCycleAt(z.idx,-1);
    else if(z.act==='slot') _init.slot=z.idx;
    else if(z.act==='lock') _initLock();
    else if(z.act==='skip') _initSkip();
    return;
  }
  if(!_atFinish()) return;
  if(_decisionUp) return;
  const z=_finZoneAt(p.x,p.y);
  if(z && z.act==='share'){ e.stopPropagation(); e.preventDefault(); _shareResult(); return; }
  _showDecision();
}, true);
// === end FINISH PROGRESSION ==================================================

// === DECISION SCREEN (v3.23) — big readable "what's next" after a race ========
// Edmund: the old progression text was tiny and unreadable, and people missed the
// "replay this board" option. The results screen now shows your stats + a big
// "PRESS ANY KEY OR TAP" prompt; the actual choices live HERE as a full-screen
// panel with large buttons. Built from _finish each time it opens. CONTINUE / RETRY
// / MAIN MENU reuse the same proven paths the old key prompts used. No localStorage.
const _decision=document.getElementById('decision');
let _decisionUp=false, _decLevel=0, _decPrimary='menu', _decOpenedAt=0, _decSel=0, _decBtnEls=[];
function _hideDecision(){ _decisionUp=false; if(_decision) _decision.classList.remove('show'); }
function _decHighlight(){ _decBtnEls.forEach((b,i)=>b.el.classList.toggle('sel',i===_decSel)); }
function _decMove(d){ const n=_decBtnEls.length; if(!n) return; _decSel=(_decSel+d+n)%n; _decHighlight(); }
function _decAction(act){
  if(Date.now()-_decOpenedAt<300) return;            // ignore the stray click/key from opening
  _hideDecision();
  if(act==='continue'){
    if(_canAdvance()) _advanceLevel();               // mid-run advance: keep banking, no picker
    else _endRun(()=>{ if(_shouldOutro()) startOutro(); else _startOver(); });   // King ending: claim, then ceremony
  } else if(act==='retry'){ try{ _hudActive=false; hctx.clearRect(0,0,1024,768); }catch(e){} launchRace(_decLevel); }  // keep banking
  else _endRun(_startOver);                          // MAIN MENU = run is over: claim, then menu
}
function _showDecision(){
  const f=_finish; if(!f||!f.done||!_decision) return;
  _decLevel=f.level|0;
  let title,sub,btns;
  if(f.level<2 && f.top2){
    const nxt=(f.level===0?'BELLE ISLE':'DOWNTOWN');
    title='YOU QUALIFIED'; sub=nxt+' UNLOCKED';

function hudTick(){
  if(window._quit) return;            // game exited — stop the loop dead (no reschedule)
  if(!_hudActive) return;
  if(_paused){ requestAnimationFrame(hudTick); return; }   // frozen while paused — the PAUSED overlay is up
  if(_homeBtn.style.display!=='flex') _homeBtn.style.display='flex';   // home button is live once gameplay starts

  const isRacing    = typeof race!=='undefined' && race.state===4;
  const isCountdown = typeof race!=='undefined' && (race.state===0||race.state===1);
  // Exit button hides while actually driving (top-left belongs to the M-10 readout
  // then); it's back on the finish screen and every menu, where you'd actually quit.
  _exitBtn.style.display = (isRacing||isCountdown) ? 'none' : 'flex';
  _pauseBtn.style.display = (isRacing||isCountdown) ? 'flex' : 'none';   // pause box lives only on the track

    }

      // Z-retry / X-next-race restart the engine WITHOUT launchRace() — reset our race state
      _raceStartTime=0; _finish={done:false}; _lastPosSeen=0; _pops=[]; _lastRawLap=0;
      _lastZoneIdx=-1; _zoneFlashStart=0;
      NOS.used=false; NOS.active=false; _nearMissReset(); _coReset(); _engineMute(false);   // fresh NOS + announcer + engine hum for the next race
      // LEVEL RE-SKIN (June 11, 2026): the engine's own Z/X restart changes race.raceNumber
      // (win + X = start(raceNumber+1); the Lodge is track 3, so X → track 0 = Belle Isle).
      // launchRace() does NOT run on these restarts, so re-apply the matching level theme here.
      const _li=levelForTrack(race.raceNumber);
      applyLevelTheme(_li);
      _l3LapReset();                  // Z-retry on Downtown re-arms the 3-lap extension
      _skyCur=LEVELS[_li].sky0; _skyPrev=null; _skyFadeT0=0;
      spawnOddities(); spawnSpeedSigns(); spawnLandmarks();
    }
    _prevRaceState=race.state;
  }
  _nosUpdate();                       // run the nitrous burst (holds the boost, then ends + locks it)
  // RACE OVER (state 5): take over the finish screen with our branded photo-finish panel
  if(typeof race!=='undefined' && race.state===5 && _raceStartTime>0){
    updateScreech(0,false);                            // kill the screech at the flag
    _engineMute(true);                                 // and the idle hum — let the music breathe on the results screen
    if(!_finish.done){ announce('Race, decided.'); captureFinish(); }
    drawFinishPanel();
    requestAnimationFrame(hudTick); return;
  }
  if(!isRacing && !isCountdown){ updateScreech(0,false); requestAnimationFrame(hudTick); return; }
  if(isRacing){ _l3LapTick(); clampPlayerToWalls(); clampAICarsToRoad(); playerBumper(); rubberBandRivals(); trackPasses(); nearMissTick(); announcerTick(); calloutTick(); }

  const ch     = chosenChar;
  const accent = ch ? ch.accent  : '#9933ff';

  const spd01    = carSpeed01();                                   // 0..1 player speed
  updateScreech(spd01, isRacing && !!(keys['ArrowLeft']||keys['ArrowRight']));  // tires squeal on hard steering
  const topMph   = ch && ch.topMph ? ch.topMph : 165;              // realistic per-car cap
  const speedMph = Math.round(spd01*topMph);
  const turbo    = typeof u1!=='undefined' ? Math.max(0,Math.min(100,u1.o1))   : 100;
  const turboOn  = typeof u1!=='undefined' && u1.v5;
  const lap      = typeof u1!=='undefined' ? u1.getLap()  : 1;
  const nCars    = typeof cars!=='undefined' ? cars.length : 15;
  const pos      = (typeof u1!=='undefined' && u1.position>0) ? u1.position : nCars;  // no more "0/15" at countdown
  // Tachometer: 8-speed auto — RPM climbs through each gear, drops on the upshift.
  const gearN    = Math.max(1,Math.min(8,Math.ceil(spd01*8)||1));
  const gearFrac = Math.max(0,Math.min(1, spd01*8-(gearN-1)));
  // Post-shift RPM floor: a real auto drops to ~3700 on an upshift, not to idle —
  // fixes the tach reading ~1.1 at 113mph right after grabbing D6. D1 still pulls from 900.
  const rpmFloor = gearN===1 ? 900 : 3700;
  const rpm      = spd01<=0.002 ? 800 : Math.round(rpmFloor+gearFrac*(6300-rpmFloor));
  const redline  = rpm>5600;

  if(isRacing || isCountdown) drawDetroitSkyline();
  if(isRacing || isCountdown) drawRivals();              // rivals FIRST, so the concrete walls
                                                         // paint OVER any car art that pokes past
                                                         // the road edge (no more cars "on" the wall)
  // DRAW ORDER (June 11): on Belle Isle the roadside structures (landmarks, album
  // billboard, oddities like the cookout/wedding) are drawn BEFORE the railing so the
  // concrete barrier paints OVER their bases — they read as standing BEHIND the rail on
  // the grass, never on the raceway. On the Lodge they stay in front (drawn later).
  const _belleDraw = (levelIdx===1||levelIdx===2);   // Belle + Downtown: props draw BEHIND the GP rail
  if((isRacing||isCountdown) && levelIdx===1) drawBelleWater();   // the Detroit River beyond the right barrier — Belle only
  if((isRacing||isCountdown) && _belleDraw){ drawLandmarks(); drawBillboard(); drawOddities(); }
  if(isRacing || isCountdown) drawTrenchWalls(accent);   // sunken trench walls / GP barrier
  if((isRacing||isCountdown) && !_belleDraw) drawLandmarks();  // (no-op on the Lodge)

  if(isRacing){

    // .time values are kept as-is but read as positions on a ~210s reference run of the
    // 2 laps — so the signs land at the same SPOTS on the road whether you're winning
    // (~100s race) or cruising. Falls back to wall-clock if engine globals are missing.
    let zoneClock=(Date.now()-_raceStartTime)/1000;
    if(typeof v2!=='undefined'&&typeof v3!=='undefined'&&typeof u1!=='undefined'&&u1&&typeof u1.lap==='number'){
      const L=v2.u0Length*v3.o9Count();
      if(L>0){
        // The grid sits at ~91% of the track loop; the engine's raw lap counter is 0 on
        // that run-up to the start line, then 1 and 2 for the two real laps (3 = finished).
        const _tot=2;                                   // all levels run 2 laps now (L3 dropped the 3-lap hack)
        const lp=Math.max(0,Math.min(2,u1.lap));
        const lapFrac=(((u1.z%L)+L)%L)/L;
        const progress=(lp===0)?0:((lp-1)+lapFrac)/_tot;   // 0..1 across the whole race

      }
