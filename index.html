<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- Save to the iPhone home screen (Share → Add to Home Screen) and this opens
     FULLSCREEN like a real app — no Safari bars. (June 8, 2026) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="THE LODGE">
<!-- manifest.json = the modern fullscreen/home-screen-app signal (some iOS
     versions need it instead of the meta tags above). Icons in icons/. -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>We On The Lodge Wit It</title>
<audio id="snd-voice" src="audio/voice_intro.mp3" preload="auto"></audio>
<audio id="snd-title" src="audio/title_music.mp3" preload="auto" loop></audio>
<audio id="snd-race"  src="audio/race_music.mp3"  preload="auto" loop></audio>
<audio id="snd-nos"   src="audio/NOS.mp3"        preload="auto"></audio>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;
  touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
#gameCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:none;}
#lodge-overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;justify-content:center;align-items:center;z-index:20;background:#000;}
#lodge-canvas{display:block;}
#hud-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:none;pointer-events:none;z-index:5;}
/* Phone browsers: 100vh includes the strip hidden behind Safari's address bar,
   which was cutting off the dashboard. 100dvh = the space you can actually see. */
@supports (height:100dvh){ #gameCanvas,#hud-canvas{height:100dvh;} }
/* Fullscreen toggle — the little ⛶ box in the corner, like every pro web game.
   Hidden on devices whose browser can't fullscreen a page (iPhone Safari) and
   when already running as a home-screen app. Glassy look matches the pad. */
#fs-btn{position:fixed;top:12px;right:12px;z-index:50;width:46px;height:46px;
  display:none;align-items:center;justify-content:center;cursor:pointer;
  background:rgba(12,12,18,0.62);border:1.5px solid rgba(255,255,255,0.32);
  border-radius:10px;padding:0;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
#fs-btn:hover{background:rgba(40,40,56,0.75);border-color:rgba(255,255,255,0.6);}
#fs-btn svg{display:block;}
/* Home button — bail back to the main menu mid-race anytime. Sits just left of
   the ⛶ box so it clears the M-10 HUD text top-left. Hidden until gameplay starts. */
#home-btn{position:fixed;top:12px;right:68px;z-index:50;width:46px;height:46px;
  display:none;align-items:center;justify-content:center;cursor:pointer;
  background:rgba(12,12,18,0.62);border:1.5px solid rgba(255,255,255,0.32);
  border-radius:10px;padding:0;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
#home-btn:hover{background:rgba(40,40,56,0.75);border-color:rgba(255,255,255,0.6);}
#home-btn svg{display:block;}
/* Refresh button — the ↻ box, leftmost of the top-right trio. ALWAYS visible on
   every screen (unlike home/⛶) so a stuck player can always tap it to reload the
   game and get back in. Same glassy look as the others. */
#refresh-btn{position:fixed;top:12px;right:124px;z-index:50;width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:rgba(12,12,18,0.62);border:1.5px solid rgba(255,255,255,0.32);
  border-radius:10px;padding:0;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
#refresh-btn:hover{background:rgba(40,40,56,0.75);border-color:rgba(255,255,255,0.6);}
#refresh-btn svg{display:block;}
/* Exit button — the ⏻ box, off on its OWN in the TOP-LEFT corner (away from the
   refresh/home/⛶ trio top-right, so nothing's crowded). Red-tinted so it's easy
   to spot as the "leave" control. Fully stops the game: all audio off, loops
   halted, then a "game exited" screen — never keeps running in the background.
   Hidden only during the actual race (where the M-10 readout lives top-left);
   shown on every menu + the finish screen, which is where you'd actually quit. */
#exit-btn{position:fixed;top:12px;left:12px;z-index:50;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:rgba(40,10,12,0.66);border:1.5px solid rgba(255,90,90,0.55);
  border-radius:10px;padding:0;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
#exit-btn:hover{background:rgba(90,20,24,0.8);border-color:rgba(255,120,120,0.9);}
#exit-btn svg{display:block;}
/* Tiny captions hanging UNDER the exit + refresh buttons so players know exactly
   what each one is for. They're children of the buttons (position:absolute, just
   below the box), so they automatically show/hide whenever their button does —
   e.g. the POWER OFF label vanishes during the race right along with its button. */
.btn-cap{position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);
  font-family:monospace;font-size:8.5px;font-weight:bold;letter-spacing:0.5px;
  line-height:1.3;text-align:center;white-space:nowrap;pointer-events:none;
  text-shadow:0 1px 3px rgba(0,0,0,0.95),0 0 5px rgba(0,0,0,0.85);}
#exit-cap{color:#ff9a9a;}
#refresh-cap{color:#ffffff;}
/* Pause box — the ⏸ control, 4th in the top-right row. Only shows on the track
   (countdown or driving), same glassy look as the trio. POSITION KNOB: change right. */
#pause-btn{position:fixed;top:12px;right:180px;z-index:50;width:46px;height:46px;
  display:none;align-items:center;justify-content:center;cursor:pointer;
  background:rgba(12,12,18,0.62);border:1.5px solid rgba(255,255,255,0.32);
  border-radius:10px;padding:0;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
#pause-btn:hover{background:rgba(40,40,56,0.75);border-color:rgba(255,255,255,0.6);}
#pause-btn svg{display:block;}
#pause-cap{color:#ffffff;}
/* Desktop key hints — a small keycap chip on each dashboard button (hidden on touch). */
.kh{display:inline-block;margin-left:5px;padding:0 4px;border:1px solid rgba(255,255,255,0.75);
  border-radius:4px;font-size:8.5px;line-height:1.45;color:#fff;vertical-align:middle;
  background:rgba(255,255,255,0.12);}
.btn-cap.kh{margin-left:0;}
@media (pointer:coarse){ .kh{display:none;} }
/* PAUSED overlay — dim full-screen veil with a RESUME button. Tapping anywhere resumes. */
#pause-screen{display:none;position:fixed;inset:0;z-index:9500;
  background:rgba(8,8,12,0.82);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
  flex-direction:column;align-items:center;justify-content:center;font-family:monospace;}
#pause-screen.show{display:flex;}
#pause-screen .ps-title{color:#FFB800;font-size:54px;font-weight:bold;letter-spacing:8px;
  text-shadow:0 0 18px rgba(255,184,0,0.5);}
#pause-screen .ps-sub{color:#cfcfda;font-size:13px;letter-spacing:2px;margin-top:8px;}
#pause-screen .ps-resume{margin-top:26px;color:#0b0b10;background:#FFB800;font-weight:bold;
  font-size:18px;letter-spacing:2px;padding:13px 34px;border-radius:30px;border:none;cursor:pointer;}
#pause-screen .ps-resume:hover{background:#ffc933;}
/* DECISION SCREEN (v3.23) — the big, readable "what's next" screen after a race. */
#decision{display:none;position:fixed;inset:0;z-index:9600;background:rgba(6,4,16,0.93);
  -webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);
  align-items:center;justify-content:center;font-family:monospace;}
#decision.show{display:flex;}
#decision .dc-card{width:min(92vw,560px);text-align:center;padding:0 20px;}
#decision .dc-title{color:#FFB800;font-size:44px;font-weight:bold;letter-spacing:5px;
  text-shadow:0 0 20px rgba(255,184,0,0.5);line-height:1.1;}
#decision .dc-sub{color:#e6e6f0;font-size:20px;letter-spacing:2px;margin-top:10px;}
#decision .dc-btns{display:flex;flex-direction:column;gap:14px;margin-top:34px;}
#decision .dc-btn{font-family:monospace;font-weight:bold;font-size:22px;letter-spacing:1.5px;
  padding:18px 22px;border-radius:14px;cursor:pointer;color:#fff;
  background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.35);}
#decision .dc-btn:hover{background:rgba(255,255,255,0.16);border-color:rgba(255,255,255,0.7);}
#decision .dc-btn.primary{color:#06210f;background:#1ED760;border-color:#1ED760;}
#decision .dc-btn.primary:hover{background:#28e06b;}
#decision .dc-btn.sel{box-shadow:0 0 0 3px #FFB800, 0 0 18px rgba(255,184,0,0.55);}
/* The exit screen — covers everything once the player quits. */
#exit-screen{display:none;position:fixed;inset:0;z-index:9998;background:#05000d;
  flex-direction:column;align-items:center;justify-content:center;gap:22px;
  text-align:center;padding:34px;font-family:monospace;cursor:pointer;}
#exit-screen .ex-title{color:#FFB800;font-size:30px;font-weight:bold;letter-spacing:3px;text-shadow:0 0 12px rgba(255,184,0,0.5);}
#exit-screen .ex-sub{color:#fff;font-size:16px;letter-spacing:1px;}
#exit-screen .ex-btn{margin-top:6px;color:#3a2700;background:#FFB800;font-size:16px;font-weight:bold;
  letter-spacing:2px;padding:12px 30px;border-radius:30px;box-shadow:0 0 16px rgba(255,184,0,0.55);}
/* ROTATE GATE — phones held upright get a full-screen "turn sideways" cover that
   hides the game and disappears the instant they rotate to landscape. iPhone
   Safari won't let a website force rotation, so this is the standard play: block
   portrait so the only way to actually play is landscape. Pure CSS so it works
   even before the JS loads. Only touch devices (pointer:coarse) in portrait — a
   desktop browser, even a narrow one, never sees it. */
#rotate-prompt{display:none;}
@media (orientation:portrait) and (pointer:coarse){
  #rotate-prompt{position:fixed;inset:0;z-index:9999;background:#05000d;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:30px;text-align:center;padding:34px;font-family:monospace;}
}
#rotate-prompt .rp-icon{animation:rp-spin 2.4s ease-in-out infinite;transform-origin:50% 50%;}
@keyframes rp-spin{0%,28%{transform:rotate(0deg);}62%,92%{transform:rotate(-90deg);}100%{transform:rotate(0deg);}}
#rotate-prompt .rp-title{color:#FFB800;font-size:30px;font-weight:bold;letter-spacing:4px;text-shadow:0 0 12px rgba(255,184,0,0.5);}
#rotate-prompt .rp-sub{color:#fff;font-size:16px;letter-spacing:1px;}
#rotate-prompt .rp-tip{color:#777;font-size:12px;letter-spacing:1px;max-width:280px;line-height:1.5;}
/* ADD-TO-HOME-SCREEN BANNER (v3.15) — gentle, dismissible, top-center. Mobile only;
   hidden when already installed (standalone) or on desktop. Android = one-tap native
   install (ADD button); iPhone = guided Share → "Add to Home Screen". z above the
   rotate gate so it's visible even in portrait, where iPhone's Share button lives. */
#a2hs{display:none;position:fixed;top:10px;left:50%;z-index:10000;max-width:94vw;
  transform:translateX(-50%) translateY(-150%);align-items:center;gap:11px;
  background:rgba(12,12,18,0.93);border:1.5px solid rgba(255,184,0,0.65);border-radius:12px;
  padding:9px 11px 9px 14px;font-family:monospace;box-shadow:0 7px 24px rgba(0,0,0,0.6);
  -webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);
  transition:transform .45s cubic-bezier(.2,.9,.3,1.18);}
#a2hs.show{display:flex;transform:translateX(-50%) translateY(0);}
#a2hs .a2-ico{flex:0 0 auto;display:flex;}
#a2hs .a2-txt{display:flex;flex-direction:column;line-height:1.22;max-width:62vw;}
#a2hs .a2-t1{color:#FFB800;font-size:12.5px;font-weight:bold;letter-spacing:1px;}
#a2hs .a2-t2{color:#fff;font-size:11px;letter-spacing:.3px;}
#a2hs .a2-add{flex:0 0 auto;color:#3a2700;background:#FFB800;font-weight:bold;font-size:12px;
  letter-spacing:1px;padding:7px 15px;border-radius:20px;border:none;cursor:pointer;display:none;}
#a2hs .a2-add:hover{background:#ffc933;}
#a2hs .a2-x{flex:0 0 auto;color:#9a9a9a;background:none;border:none;font-size:19px;line-height:1;
  cursor:pointer;padding:0 6px;}
#a2hs .a2-x:hover{color:#fff;}
/* IN-GAME ALBUM / SPONSOR CTA (v3.17) — per-driver promo card on the finish
   screen. Slides up from the bottom while the results screen is up; the driver
   you raced as gets their own Spotify (or brewery) button. Pure UI overlay,
   z below the a2hs banner so the two never fight. POSITION KNOB: edit bottom/left. */
#sponsor{display:none;position:fixed;left:50%;bottom:14px;z-index:9000;max-width:94vw;
  transform:translateX(-50%) translateY(160%);align-items:center;gap:12px;
  background:rgba(12,12,18,0.94);border:1.5px solid rgba(255,255,255,0.22);border-radius:12px;
  padding:8px 12px 8px 10px;font-family:monospace;box-shadow:0 7px 24px rgba(0,0,0,0.6);
  -webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);
  transition:transform .42s cubic-bezier(.2,.9,.3,1.18);}
#sponsor.show{display:flex;transform:translateX(-50%) translateY(0);}
#sponsor #sp-img{width:54px;height:54px;border-radius:6px;object-fit:cover;flex:0 0 auto;background:#222;}
#sponsor .sp-txt{display:flex;flex-direction:column;line-height:1.22;max-width:46vw;}
#sponsor .sp-k{color:#9a9a9a;font-size:10px;letter-spacing:1.2px;}
#sponsor .sp-t{color:#fff;font-size:14px;font-weight:bold;letter-spacing:.4px;}
#sponsor .sp-s{color:#bdbdbd;font-size:11px;letter-spacing:.2px;}
#sponsor .sp-btn{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
  text-decoration:none;font-weight:bold;font-size:12px;letter-spacing:.6px;
  padding:8px 14px;border-radius:20px;white-space:nowrap;cursor:pointer;}
#sponsor .sp-btn.spotify{background:#1ED760;color:#03190c;}
#sponsor .sp-btn.brewery{background:#FFB800;color:#3a2700;}
#sponsor .sp-x{flex:0 0 auto;color:#9a9a9a;background:none;border:none;font-size:18px;
  line-height:1;cursor:pointer;padding:0 4px;}
#sponsor .sp-x:hover{color:#fff;}
</style>
</head>

<script>
m4.render = function(){};
// Suppress the engine's procedural player car (function m2). We draw the real
// character car ourselves on the HUD canvas, so there's nothing green underneath.
if (typeof m2 !== 'undefined') m2 = function(){};

// Suppress the engine's big countdown text (states 0 "RACE"/number + 1 "3-2-1").
// We replace it with the READY/SET/GO starter girl on the HUD canvas. race.render
// still runs (it draws the road via l7()); we only neutralize fillText during the
// countdown so the road/scene stays, but the giant digits don't. k9() also draws
// through this same context, so both the "RACE" text and the digit are covered.
if (typeof race !== 'undefined' && typeof t6 !== 'undefined') {
  const _origRaceRender = race.render.bind(race);
  const _noFill = function(){};
  race.render = function(){
    // Hide the two rivals' GREEN cars: shrink their width to 0 for the engine's draw only,
    // so the engine renders nothing for them; we paint their real car art on the HUD canvas
    // instead (drawRivals). Width is restored right after, so the AI / collision still use
    // the real size. This is bulletproof — there's simply no green car to peek through.
    const rv = (typeof _rivals !== 'undefined' && _rivals) ? _rivals : [];
    for (const r of rv){ if (r.car && r.car._realW != null) r.car.width = 0; }
    try {
      if (this.state === 0 || this.state === 1) {
        const _ft = t6.fillText;
        t6.fillText = _noFill;
        try { _origRaceRender(); } finally { t6.fillText = _ft; }
      } else {
        _origRaceRender();
      }
    } finally {
      for (const r of rv){ if (r.car && r.car._realW != null) r.car.width = r.car._realW; }
    }
  };
}
</script>

<script>
'use strict';

const OC  = document.getElementById('lodge-canvas');
const oct = OC.getContext('2d');
const GW=1024, GH=640;

function resizeOverlay(){
  const s = Math.min(innerWidth/GW, innerHeight/GH);
  OC.style.width  = (GW*s)+'px';
  OC.style.height = (GH*s)+'px';
}
window.addEventListener('resize', resizeOverlay); resizeOverlay();

const SRCS = {
  title:         'art/screens/title.png',
  warnPoster:    'art/screens/warning_poster.png',
  howToPlay:     'art/screens/howto.png',
  zhaion:        'art/portraits/zhaion.png',
  edmund:        'art/portraits/edmund.png',

// === TOUCH / TAP CONTROLS (June 8, 2026) =====================================
// The on-screen pad is now REAL: tap/hold the buttons on a phone (or click them
// with a mouse) and they send the exact same key events the keyboard does — the
// engine and the HUD can't tell the difference, so keyboard play is untouched.
// Multi-touch works (gas with one thumb, steer with the other), and you can
// slide a thumb between LEFT/RIGHT without lifting. The buttons register their
// hit zones in _padZones every frame (see drawControls). On the menus, a tap
// acts as Enter (on driver select: left/right edges browse, middle picks).
// Switch: TOUCH_ON.
const TOUCH_ON = true;
window._padZones = [];                                  // {x,y,w,h,key,code,kc} per button, rebuilt each frame
const _ptrHeld = {};                                    // pointerId -> zone currently held
function _synthKey(down,key,code,kc){
  document.dispatchEvent(new KeyboardEvent(down?'keydown':'keyup',
    {key,code,keyCode:kc,which:kc,bubbles:true,cancelable:true}));
}
function _tapKey(key,code,kc){ _synthKey(true,key,code,kc); setTimeout(()=>_synthKey(false,key,code,kc),60); }
function _toHud(e){ return {x:e.clientX*1024/innerWidth, y:e.clientY*768/innerHeight}; }
function _zoneAt(x,y){
  for(const z of window._padZones)                      // 14px of forgiveness around each button — thumbs aren't cursors
    if(x>=z.x-14 && x<=z.x+z.w+14 && y>=z.y-14 && y<=z.y+z.h+14) return z;
  return null;
}

// === DRIVER-SELECT NAV ZONES (June 8, 2026) ==================================
// The driver-select screen now has VISIBLE, clickable navigation — big arrow
// buttons, tappable cards, and a SELECT button (drawn in drawSelect). These
// helpers translate a mouse/touch point into canvas coords and fire the matching
// action. Works for BOTH desktop mouse AND mobile touch — same code path, so the
// keyboard arrows/Enter still do exactly what they always did. Each entry is
// {x,y,w,h,act[,idx]} in 1024x640 canvas space, rebuilt every frame by drawSelect.
window._selZones=[]; window._selHover=null;
function _canvasXY(e){
  const r=OC.getBoundingClientRect();
  if(!r.width||!r.height) return null;
  return { x:(e.clientX-r.left)*GW/r.width, y:(e.clientY-r.top)*GH/r.height };
}
function _selZoneAt(e){
  const p=_canvasXY(e); if(!p) return null;
  for(const z of window._selZones)
    if(p.x>=z.x && p.x<=z.x+z.w && p.y>=z.y && p.y<=z.y+z.h) return z;
  return null;
}
function _doSelZone(z){
  if(z.act==='left')        _tapKey('ArrowLeft','ArrowLeft',37);
  else if(z.act==='right')  _tapKey('ArrowRight','ArrowRight',39);
  else if(z.act==='select') _tapKey('Enter','Enter',13);
  else if(z.act==='pick'){
    if(z.idx===selChar)     _tapKey('Enter','Enter',13);   // tap the already-chosen card again = race
    else { selChar=z.idx; _navClick(); }                   // otherwise just move the highlight there (with a tick)
  }
}

window.addEventListener('pointerdown',e=>{
  if(!TOUCH_ON) return;
  // The lobby overlay being hidden = we're past driver select and into the race
  // flow. (Can't trust race.state alone: the engine idles at 0 on the menus too,
  // the same value it uses for the countdown.)
  const lobbyUp = document.getElementById('lodge-overlay').style.display!=='none';
  const inRace = !lobbyUp && typeof race!=='undefined' && (race.state===4||race.state===0||race.state===1);
  if(inRace){
    const p=_toHud(e), z=_zoneAt(p.x,p.y);
    if(z){ _ptrHeld[e.pointerId]=z; _synthKey(true,z.key,z.code,z.kc); e.preventDefault(); }
  }
  // Menu taps are handled on pointerUP (_ptrEnd) — finger-lift is the gesture
  // iOS counts as user activation for audio, so the voice intro can start.
},{passive:false});
function _ptrEnd(e){
  const z=_ptrHeld[e.pointerId];
  if(z){ _synthKey(false,z.key,z.code,z.kc); delete _ptrHeld[e.pointerId]; return; }

  const lobbyUp = document.getElementById('lodge-overlay').style.display!=='none';
  if(!lobbyUp) return;                                   // in-race input is handled on pointerdown

  // First touch on the menus: go fullscreen where the browser allows it
  // (Android Chrome etc.). iPhone Safari doesn't allow this for pages — there,
  // Add to Home Screen is the fullscreen route (meta tags in <head>). Touch only.
  if(e.pointerType!=='mouse' && !window._fsTried){ window._fsTried=true;
    try{ const el=document.documentElement;
      if(el.requestFullscreen) el.requestFullscreen({navigationUI:'hide'}).then(_tryLockLandscape).catch(()=>{});
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }catch(err){}
    _tryLockLandscape();   // some Androids allow the lock without waiting for fullscreen
  }

  // DRIVER SELECT: drive the on-screen nav buttons/cards. Works for mouse AND
  // touch — this is what fixed the desktop "free fall" (mouse used to do nothing
  // on the menus). A click/tap that misses every button does nothing on purpose.
  if(state===ST.SELECT){
    const sz=_selZoneAt(e);
    if(sz) _doSelZone(sz);
    return;
  }
  // TITLE / HOW-TO: a click or tap anywhere advances, same as Enter.
  if(state===ST.TITLE||state===ST.HOWTO){ _tapKey('Enter','Enter',13); }
  // ST.INTRO: the video's own click handler skips it.
}
window.addEventListener('pointerup',_ptrEnd);
window.addEventListener('pointercancel',_ptrEnd);
window.addEventListener('pointermove',e=>{              // slide between buttons without lifting

    const p=_toHud(e), z=_zoneAt(p.x,p.y);
    if(z && z!==held){ _synthKey(false,held.key,held.code,held.kc);
      _ptrHeld[e.pointerId]=z; _synthKey(true,z.key,z.code,z.kc); }
    return;

  // Driver-select hover: light up the arrow/card/SELECT button under the cursor
  // and show a pointer cursor, so desktop players see what's clickable.
  const lobbyUp = document.getElementById('lodge-overlay').style.display!=='none';
  if(lobbyUp && state===ST.SELECT){
    const z=_selZoneAt(e);
    window._selHover = z ? {act:z.act, idx:z.idx} : null;
    OC.style.cursor = z ? 'pointer' : 'default';
  } else if(window._selHover){ window._selHover=null; OC.style.cursor='default'; }
});

// === ADD TO HOME SCREEN BANNER (v3.15, June 13, 2026) =======================
// A gentle, dismissible top-center banner nudging mobile players to install the
// game to their home screen, where manifest.json launches it FULLSCREEN/landscape
// like a real app. Android (Chromium) gets a one-tap native install via the
// captured `beforeinstallprompt`; iPhone Safari has no install API at all, so we
// show the manual Share → "Add to Home Screen" steps. Never shows on desktop, or
// when already running as the installed app (standalone), or once the player has
// added/dismissed it. Uses its OWN localStorage key 'lodge_a2hs' — it never reads
// or writes any score/initials/board data. Pure UI; wrapped so it can't throw.
(function(){
  try{
    const KEY='lodge_a2hs';
    const el=document.getElementById('a2hs'); if(!el) return;
    const coarse=!!(window.matchMedia&&matchMedia('(pointer:coarse)').matches);  // touch device
    function standalone(){ return !!((window.matchMedia&&matchMedia('(display-mode: standalone),(display-mode: fullscreen)').matches)||window.navigator.standalone===true); }
    function done(){ try{ return !!localStorage.getItem(KEY); }catch(e){ return false; } }
    function setDone(v){ try{ localStorage.setItem(KEY,v||'1'); }catch(e){} }
    const ua=navigator.userAgent||'';
    const isIOS=/iphone|ipad|ipod/i.test(ua) || (/macintosh/i.test(ua) && 'ontouchend' in document);  // incl. iPadOS
    let deferred=null, shown=false;
    const IC_SHARE='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FFB800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14.5V4"/><path d="M8.5 7.5 12 4l3.5 3.5"/><path d="M6 11v7a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-7"/></svg>';
    const IC_PHONE='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FFB800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2.5" width="12" height="19" rx="2.4"/><line x1="12" y1="6.5" x2="12" y2="12"/><line x1="9.25" y1="9.25" x2="14.75" y2="9.25"/></svg>';
    function show(){
      if(shown||standalone()||!coarse||done()) return;
      shown=true;
      const t2=document.getElementById('a2-t2'), ico=document.getElementById('a2-ico'), add=document.getElementById('a2-add');
      // WHY copy: full screen + one-tap return are the actual benefits.
      if(deferred){ ico.innerHTML=IC_PHONE; t2.textContent='Add it free — full screen, and one tap to play again.'; add.style.display='block'; }
      else if(isIOS){ ico.innerHTML=IC_SHARE; t2.textContent="Full screen + one tap to replay: tap Share, then 'Add to Home Screen'."; add.style.display='none'; }
      else { ico.innerHTML=IC_PHONE; t2.textContent='Add to your home screen — full screen, one tap to replay.'; add.style.display='none'; }
      requestAnimationFrame(()=>el.classList.add('show'));
    }

    window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferred=e; });  // stash; shown after first race

      e.stopPropagation();

      hide();
    });
    document.getElementById('a2-x').addEventListener('click',e=>{ e.stopPropagation(); setDone('dismissed'); hide(); });
    // TRIGGER (v3.16): hold the banner until the player's FIRST race FINISHES — the

    // load (where it stacked on the warning + rotate prompt). We watch the engine's
    // own finish signal (race.state===5 + _finish.done) without touching game code.
    if(coarse && !standalone() && !done()){

        try{
          if(shown||done()){ clearInterval(poll); return; }
          if(typeof race!=='undefined' && race && race.state===5 && typeof _finish!=='undefined' && _finish && _finish.done){

// === IN-GAME PAUSE (June 13, 2026) ===========================================
// A real pause for phone-call / "hold up a sec" moments (you can't pause a phone
// game otherwise). Freezes the race with ZERO engine edits: the engine runs ONE
// internal rAF loop whose only sim step is race.update(t) — we wrap that single
// call so it no-ops while paused, so the car + countdown freeze in place and the
// frozen frame keeps drawing. We also pause the music, mute the idle engine hum,
// suspend the tire-screech context, and raise a PAUSED overlay with a RESUME button.
// Tapping the overlay, the RESUME button, the pause box again, or pressing P toggles
// it. Only works ON THE TRACK (countdown or driving), never on menus or the finish
// screen. Writes NO localStorage. Wrapped so it can never break the game.
const _pauseBtn=document.getElementById('pause-btn');
const _pauseScreen=document.getElementById('pause-screen');
let _paused=false, _pausedEls=[];
function _canPause(){
  try{
    const lobbyUp=document.getElementById('lodge-overlay').style.display!=='none';
    return !lobbyUp && !window._quit && typeof race!=='undefined' && race &&
           (race.state===4||race.state===0||race.state===1);   // countdown or driving only
  }catch(e){ return false; }
}
function pauseGame(){
  if(_paused || !_canPause()) return;
  _paused=true;
  _pausedEls=[];
  for(const el of [_voice,_title,_race]){ if(el && !el.paused){ _pausedEls.push(el); try{ el.pause(); }catch(e){} } }
  if(_introVid && !_introVid.paused){ _pausedEls.push(_introVid); try{ _introVid.pause(); }catch(e){} }
  try{ _engineMute(true); }catch(e){}                                     // silence the idle engine hum
  try{ if(_sctx && _sctx.state==='running') _sctx.suspend(); }catch(e){}  // stop the tire-screech drone
  try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){}
  if(_pauseScreen) _pauseScreen.classList.add('show');
}
function resumeGame(){
  if(!_paused) return;
  _paused=false;
  if(_pauseScreen) _pauseScreen.classList.remove('show');
  try{ _engineMute(false); }catch(e){}
  try{ if(_sctx && _sctx.state==='suspended') _sctx.resume().catch(()=>{}); }catch(e){}
  for(const el of _pausedEls){ try{ el.play().catch(()=>{}); }catch(e){} }
  _pausedEls=[];
}
function togglePause(){ if(_paused) resumeGame(); else pauseGame(); }
// Freeze the sim by no-op'ing the engine's ONE update call while paused (no engine edit).
(function _wrapUpdate(){
  try{
    if(typeof race!=='undefined' && race && typeof race.update==='function' && !race.__lodgePauseWrap){
      const _realUpdate=race.update.bind(race);
      race.update=function(t){ if(_paused) return; return _realUpdate(t); };
      race.__lodgePauseWrap=true; return;
    }
  }catch(e){}
  setTimeout(_wrapUpdate,200);   // engine global not ready yet — try again
})();
if(_pauseBtn){
  for(const ev of ['pointerdown','pointerup']) _pauseBtn.addEventListener(ev, e=>e.stopPropagation());
  _pauseBtn.addEventListener('click', e=>{ e.stopPropagation(); togglePause(); _pauseBtn.blur(); });
}
if(_pauseScreen){
  for(const ev of ['pointerdown','pointerup','click']) _pauseScreen.addEventListener(ev, e=>e.stopPropagation());
  _pauseScreen.addEventListener('click', ()=>resumeGame());              // tap the dim veil = resume
  const _rb=document.getElementById('ps-resume');
  if(_rb) _rb.addEventListener('click', e=>{ e.stopPropagation(); resumeGame(); });
}
// Keyboard: P toggles pause (desktop). 'p' isn't a driving key, so it never fights them.
document.addEventListener('keydown', e=>{
  if(e.repeat) return;
  if(e.key==='p'||e.key==='P'){ if(_paused || _canPause()){ e.preventDefault(); togglePause(); } }
}, true);

// === DESKTOP UTILITY-BUTTON KEYS (June 13, 2026) =============================
// So desktop players know AND can use the corner buttons by key: R = refresh,
// H = home/menu, F = fullscreen, Q = power-off (NOT Esc — Esc exits fullscreen,
// which would cause accidental quits). Each key fires only when its button is
// actually available (mirrors the button's own show/hide), and the whole set is
// disabled while typing initials or during an intro/cinematic so it never steals
// those keystrokes. stopImmediatePropagation on a hit so the finish-screen
// 'any key advances' handler doesn't also fire. Pause is P (handled above). The
// on-screen labels are the .kh chips, shown on desktop only. Wrapped, no localStorage.
document.addEventListener('keydown', e=>{
  try{
    if(e.repeat || e.metaKey || e.ctrlKey || e.altKey) return;   // leave Cmd+R etc. alone
    if(_init && _init.on) return;                                // typing initials — hands off
    if(state===ST.INTRO) return;                                 // intro/cinematic — let any-key skip work
    let acted=false; const k=(e.key||'').toLowerCase();
    if(k==='r'){ _reloadClean(); acted=true; }
    else if(k==='h'){ if(_homeBtn && _homeBtn.style.display==='flex'){ _reloadClean(); acted=true; } }
    else if(k==='f'){ _fsToggle(); acted=true; }
    else if(k==='q'){ if(_exitBtn && _exitBtn.style.display!=='none'){ quitGame(); acted=true; } }
    if(acted){ e.stopImmediatePropagation(); e.preventDefault(); }
  }catch(err){}
}, true);
// === end DESKTOP UTILITY-BUTTON KEYS =========================================

// === RACE MUSIC ROTATION (June 7, 2026) ====================================
// Race music no longer loops one song. Your driver's track plays FIRST, and
// when it ends the other drivers' songs follow in rotation (then back around),
// so long sessions hear the whole catalog. Music keeps playing through
// engine-side Z-retries, so the rotation carries across races.
let _racePlaylist=[], _raceIdx=0;
function buildRacePlaylist(ch){
  // Pick the song family for the current level (Downtown = L3, Belle Isle = L2, else Lodge).
  const belle = (typeof levelIdx!=='undefined' && levelIdx===1);
  const dtwn  = (typeof levelIdx!=='undefined' && levelIdx===2);
  const MAP = dtwn ? RACE_MUSIC_DOWNTOWN : belle ? RACE_MUSIC_BELLE : RACE_MUSIC;
  const fallback = dtwn ? 'audio/zhaion_downtown.mp3' : belle ? 'audio/zhaion_belle.mp3' : 'audio/race_music.mp3';
  const first=(ch && MAP[ch.name]) || fallback;
  // driver's song first, then the OTHER drivers' songs from the SAME family, in rotation
  return [first, ...Object.values(MAP).filter(s=>s!==first)];
}
function _nextRaceSong(){
  if(!_racePlaylist.length) return;
  _raceIdx=(_raceIdx+1)%_racePlaylist.length;
  _race.src=_racePlaylist[_raceIdx];
  _race.currentTime=0;
  _race.play().catch(()=>{});
}

function unlockAudio(){
  if(_unlocked)return; _unlocked=true;
  // Driver-select plays exactly ONE thing: the "WE ON THE LODGE WIT IT" vocal — and
  // NO music, EVER (Edmund's call: that vocal is the best part). So we play the vocal
  // once and we DELIBERATELY do NOT start the title music when it ends (the old
  // _voice.onended that kicked off title_music is gone). Mobile audio is also unlocked
  // by blessAudioOnce(), which keeps the vocal (_voice._realPlay) instead of pausing it.
  _voice._realPlay=true;
  _voice.volume=0.9; _voice.play().catch(()=>{});
}

// Hard stop for the lobby audio — called the moment a driver is picked.
// Kills any in-flight fade (so it can't push the volume back up), stops the
// voice intro, and unhooks its onended so title music can never start late.
// Title music isn't needed again after this point (retries restart the race,
// not the lobby), so this is a clean permanent cut.
function killTitleMusic(){
  clearInterval(_titleFadeInt);
  _voice.onended=null; _voice.pause();
  _title.pause(); _title.volume=0; _tPlaying=false;
}

// === HARD MUSIC CUTOFF (June 8, 2026) ========================================
// One switch that silences EVERY sound source the game owns, so two songs can
// never overlap when you cross from one section to another. The bug it kills:
// music from a board (lobby music, a driver's intro-video audio, a previous
// race's track) bleeding into the next section and stacking up. Call this the
// instant you LEAVE a section; whatever the new section wants to play, it starts
// fresh afterward. It tears down BOTH music fades, the race-song rotation, every
// <audio> element (paused + rewound), the intro video's audio, and the announcer
// speech — belt and suspenders, because each one has bitten us on iOS before.
function stopAllMusic(){
  clearInterval(_titleFadeInt); clearInterval(_raceFadeInt);
  _voice.onended=null;                         // never let title music start late
  _race.onended=null;                          // stop the race-song rotation from advancing
  for(const el of [_voice,_title,_race]){
    try{ el.pause(); el.currentTime=0; }catch(e){}
    el.volume=0;                               // belt + suspenders: silence even if a pending play() resumes it
  }
  _tPlaying=false;
  _racePlaylist=[]; _raceIdx=0;
  try{ if(_nos){ _nos.pause(); _nos.currentTime=0; } }catch(e){}   // cut the NOS SFX if it's mid-play
  if(_introVid){ try{ _introVid.pause(); _introVid.muted=true; }catch(e){} }   // intro video carries its own music
  try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){}        // stop the lap announcer
  try{ if(_scGain) _scGain.gain.value=0; _scOn=false; }catch(e){}              // kill the tire-screech drone too
}

// Every "restart/reload" path MUST go through this — NOT a bare location.reload().
// On mobile, a playing track (e.g. Zhaion's race song) can survive a same-page
// reload for a beat, so it overlaps the fresh page's lobby music = two songs. So:
// silence everything synchronously FIRST, then reload. This is the fix for "the
// driver-select music and the race song both playing after I restarted."
function _reloadClean(){
  try{ stopAllMusic(); }catch(e){}
  try{ if(_sctx && _sctx.state==='running') _sctx.suspend(); }catch(e){}
  try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){}
  try{ location.reload(); }catch(e){ try{ location.href=location.pathname; }catch(_){} }
}
// === end HARD MUSIC CUTOFF ===================================================

// === MOBILE AUDIO UNLOCK (June 8, 2026) ======================================
// Phones refuse ALL audio until the user touches the page — and on iOS each
// media element must start inside a real gesture at least once or it stays
// mute even after that (that's why the voice intro + title music never played
// on the iPhone test). Fix: the FIRST real gesture (finger lift or key press)
// silently "blesses" every sound the game owns — each <audio> does a muted
// play/pause, the tire-screech WebAudio context is created + resumed, and the
// speech announcer says an empty utterance — so every later .play()/speak()
// is allowed, exactly like on desktop. (Menu taps also moved to finger-LIFT,
// pointerup, because that's the gesture iOS actually counts for audio.)
let _blessed=false;
function blessAudioOnce(){
  if(_blessed) return; _blessed=true;
  for(const el of [_voice,_title,_race]){             // NOS is intentionally NOT blessed here — it must never make a sound off the track
    if(!el.paused) continue;                          // already playing — leave it alone
    const v=el.volume; el.muted=true;
    el.play().then(()=>{
      if(el._realPlay){ el.muted=false; return; }     // a real play started meanwhile — don't cut it off
      el.pause(); el.currentTime=0; el.muted=false; el.volume=v;
    }).catch(()=>{ el.muted=false; el.volume=v; });
  }
  try{ _screechInit(); if(_sctx && _sctx.state==='suspended') _sctx.resume(); }catch(e){}
  try{ if(window.speechSynthesis){ const u=new SpeechSynthesisUtterance(''); u.volume=0; speechSynthesis.speak(u); } }catch(e){}
}
window.addEventListener('pointerup', e=>{ if(e.isTrusted) blessAudioOnce(); }, true);
window.addEventListener('keydown',  e=>{ if(e.isTrusted) blessAudioOnce(); }, true);
// === end MOBILE AUDIO UNLOCK =================================================

// === BACKGROUND AUTO-PAUSE (June 8, 2026) ====================================
// HTML audio keeps blasting when a tab/app is hidden — that's the "runs in the
// background and annoys people" problem, and it's ALSO how you end up with two
// songs: a backgrounded copy still playing while a fresh one starts. Fix: the
// moment the page is hidden (tab switch, home button, app backgrounded, screen
// lock), hard-pause every sound and remember what WAS playing; when the page
// comes back, resume exactly that. Belt-and-suspenders across visibilitychange
// (the main signal) and pagehide (navigation away). Skipped entirely once the
// player has hit Exit (_quit), so a quit game never resurrects its audio.
let _bgPaused=[];
function _pauseForBackground(){
  _bgPaused=[];
  for(const el of [_voice,_title,_race]){
    if(el && !el.paused){ _bgPaused.push(el); try{ el.pause(); }catch(e){} }
  }
  if(_introVid && !_introVid.paused){ _bgPaused.push(_introVid); try{ _introVid.pause(); }catch(e){} }
  try{ if(_sctx && _sctx.state==='running') _sctx.suspend(); }catch(e){}   // pause the tire-screech engine
  try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){}
}
function _resumeFromBackground(){
  if(window._quit) return;                                  // exited game stays silent
  for(const el of _bgPaused){ try{ el.play().catch(()=>{}); }catch(e){} }
  _bgPaused=[];
  try{ if(_sctx && _sctx.state==='suspended') _sctx.resume().catch(()=>{}); }catch(e){}
}
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden) _pauseForBackground(); else _resumeFromBackground();
});
window.addEventListener('pagehide', _pauseForBackground);
window.addEventListener('beforeunload', ()=>{ try{ _flushPendingAuto(); }catch(e){} });   // never lose a banked board on a hard quit
// Back-forward cache: phones can restore a snapshot of the page (scripts NOT
// re-run) with its old audio resurrected — a classic "two songs" trap. If we're
// restored from that cache, force one clean reload so the game starts fresh and
// silent instead of resuming a stale race track under the lobby music.
window.addEventListener('pageshow', e=>{ if(e.persisted) _reloadClean(); });
// === end BACKGROUND AUTO-PAUSE ===============================================

// launchRace(li): li = level index (0 = the Lodge, 1 = Belle Isle). Defaults to 0,
// so the menu's normal "pick driver → race" flow is unchanged. The win → X path to
// Belle Isle does NOT come through here (it's the engine's own restart, re-skinned in
// hudTick); this arg also gives a one-liner for jumping to a level directly:
// in the console, after picking a driver, run  launchRace(1)  to test Belle Isle.
function launchRace(li){
  li=(li|0)||0; const _L=LEVELS[li]||LEVELS[0];
  stopAllMusic();   // hard cut — kill lobby music AND any intro-video/old-race audio first
  const gc=document.getElementById('gameCanvas');
  gc.style.display='block';
  const gctx=gc.getContext('2d');
  gctx.fillStyle='#05000d'; gctx.fillRect(0,0,1024,768);
  gctx.fillStyle='#cc44ff'; gctx.font='bold 44px monospace'; gctx.textAlign='center';
  gctx.fillText(_L.loading,512,400);
  gctx.fillStyle='#ffffff'; gctx.font='bold 18px monospace';
  gctx.fillText('↑ GAS    ←→ STEER    X NITROUS    Z DRIFT',512,448);
  document.getElementById('lodge-overlay').style.display='none';
  setTimeout(()=>{
    try {
      if(typeof last!=='undefined') last=performance.now();

      startGame(_L.track);            // Lodge = track 3 (o4); Belle Isle = track 0 (o3); Downtown = track 2 (n8)
      applyLevelTheme(li);            // road palette + active zones/oddities/skyline for this level
      _l3LapReset();                  // arm the 3-lap extension on Downtown (no-op elsewhere)
      _raceStartTime=0; _lastZoneIdx=-1; _zoneFlashStart=0;
      _skyCur=_L.sky0; _skyPrev=null; _skyFadeT0=0;  // first skyline for this level
      _finish={done:false}; _lastPosSeen=0; _pops=[]; _lastRawLap=0;   // reset the retry-loop state per race
      assignRivals();        // tag the two non-chosen artists onto opponent cars
      tuneFieldSpeeds();     // make the race WINNABLE + rivals competitive (June 7, 2026)
      spawnOddities();       // scatter the weird Lodge sightings around the loop
      spawnSpeedSigns();     // SPEED LIMIT 55 (sure, buddy)
      spawnLandmarks();      // Belle Isle structures at fixed map spots (L2 only)
      startHUD();
      _racePlaylist=buildRacePlaylist(chosenChar);      // driver's song first, then the rest
      _raceIdx=0; _race.loop=false; _race.onended=_nextRaceSong;
      _race.src=_racePlaylist[0];
      _race.currentTime=0; _race.volume=0; _race.play().catch(()=>{});
      clearInterval(_raceFadeInt);
      let rv=0; _raceFadeInt=setInterval(()=>{ rv=Math.min(rv+0.05,0.8); _race.volume=rv; if(rv>=0.8)clearInterval(_raceFadeInt); },60);
    } catch(err) {
      const gctx=document.getElementById('gameCanvas').getContext('2d');
      gctx.fillStyle='#000'; gctx.fillRect(0,0,1024,768);
      gctx.fillStyle='#ff4444'; gctx.font='bold 24px monospace'; gctx.textAlign='center';
      gctx.fillText('ENGINE ERROR:', 512, 300);
      gctx.fillStyle='#fff'; gctx.font='16px monospace';
      gctx.fillText(err.message, 512, 340);
      console.error('Race launch error:', err);
    }
  }, 150);
}

function fitImg(img,x,y,w,h){
  if(!img||!img.naturalWidth)return;
  const s=Math.min(w/img.naturalWidth,h/img.naturalHeight);
  oct.drawImage(img,x+(w-img.naturalWidth*s)*.5,y+(h-img.naturalHeight*s)*.5,img.naturalWidth*s,img.naturalHeight*s);
}

// Lighten/darken a #rrggbb hex by amt (-255..255). Used for button gradients.
function _shade(hex,amt){
  let h=hex.replace('#','');
  if(h.length===3) h=h.replace(/(.)/g,'$1$1');
  const num=parseInt(h,16);
  const cl=v=>Math.max(0,Math.min(255,v));
  const r=cl((num>>16)+amt), g=cl(((num>>8)&255)+amt), b=cl((num&255)+amt);
  return '#'+(1<<24|r<<16|g<<8|b).toString(16).slice(1);
}

// One glassy nav arrow (the < and > on the sides of the roster).
function _navArrow(x,y,w,h,dir,hovd,acc){
  oct.save();
  if(hovd){ oct.shadowColor=acc; oct.shadowBlur=20; }
  _roundRect(oct,x,y,w,h,16);
  oct.fillStyle=hovd?'rgba(46,46,62,0.9)':'rgba(20,20,30,0.7)'; oct.fill();
  oct.shadowBlur=0;
  _roundRect(oct,x+4,y+4,w-8,h*0.34,11);                  // glass top highlight
  oct.fillStyle='rgba(255,255,255,0.12)'; oct.fill();
  _roundRect(oct,x,y,w,h,16);                             // rim
  oct.strokeStyle=hovd?acc:'rgba(255,255,255,0.32)'; oct.lineWidth=2; oct.stroke();
  const cx=x+w/2, cy=y+h/2, s=15, d=(dir==='left'?-1:1); // chevron
  oct.strokeStyle=hovd?'#fff':'#dcdcdc'; oct.lineWidth=5;
  oct.lineCap='round'; oct.lineJoin='round';
  oct.beginPath();
  oct.moveTo(cx-d*s*0.45,cy-s); oct.lineTo(cx+d*s*0.55,cy); oct.lineTo(cx-d*s*0.45,cy+s);
  oct.stroke();
  oct.restore();
}

function drawSelect(){
  oct.fillStyle='#000011'; oct.fillRect(0,0,GW,GH);
  oct.textAlign='center';

  // ---- title ----
  oct.fillStyle='#FFB800'; oct.font='bold 32px monospace';
  oct.shadowColor='#000'; oct.shadowBlur=8;
  oct.fillText('SELECT YOUR DRIVER',GW/2,44); oct.shadowBlur=0;

  const zones=[], hov=window._selHover||{};
  const n=CHARS.length, gap=18;
  const AW=58, AH=96, am=18;                              // arrow width / height / side margin
  const lx=am, rx=GW-am-AW;                               // left & right arrow x
  const rowL=lx+AW+14, rowR=rx-14, rowW=rowR-rowL;        // card row spans between the arrows
  const cw=Math.floor((rowW-gap*(n-1))/n);
  const ch=Math.round(cw*288/238);
  const sy=86;
  const sx=rowL+(rowW-(cw*n+gap*(n-1)))/2;                // center the cards within the row
  const ay=sy+ch/2-AH/2;                                  // arrows centered on the cards
  const acc=CHARS[selChar].accent;

  // ---- driver cards (each is clickable) ----
  CHARS.forEach((c,i)=>{
    const x=sx+i*(cw+gap), y=sy, sel=i===selChar, hovd=(hov.act==='pick'&&hov.idx===i);
    if(sel){ oct.shadowColor=c.accent; oct.shadowBlur=26;
      oct.fillStyle=c.accent+'2e'; oct.fillRect(x-10,y-10,cw+20,ch+62); oct.shadowBlur=0; }
    oct.globalAlpha = sel?1:(hovd?0.95:0.78);             // dim the un-picked ones so the pick pops
    const img=imgs[c.imgKey];
    if(img&&img.naturalWidth) oct.drawImage(img,x,y,cw,ch);
    else{ oct.fillStyle=c.primary+'aa'; oct.fillRect(x,y,cw,ch); }
    oct.globalAlpha=1;
    oct.strokeStyle=sel?'#FFD700':(hovd?'#aaa':'#555'); oct.lineWidth=sel?4:2;
    oct.strokeRect(x,y,cw,ch);
    if(sel){                                              // gold check badge, top-right
      oct.fillStyle='#FFD700'; oct.beginPath(); oct.arc(x+cw-16,y+16,13,0,7); oct.fill();
      oct.fillStyle='#000'; oct.font='bold 16px monospace'; oct.fillText('✓',x+cw-16,y+22);
    }
    oct.fillStyle='#111'; oct.fillRect(x,y+ch+2,cw,42);   // name plate
    oct.fillStyle=sel?'#FFD700':'#eee'; oct.font='bold 12px monospace';
    const w=c.name.split(' ');
    if(w.length>1){ oct.fillText(w[0],x+cw/2,y+ch+18); oct.fillText(w.slice(1).join(' '),x+cw/2,y+ch+32); }
    else oct.fillText(c.name,x+cw/2,y+ch+24);
    oct.fillStyle=sel?c.accent:'#777'; oct.font='bold 10px monospace';
    oct.fillText(c.car,x+cw/2,y+ch+(w.length>1?44:40));
    zones.push({x:x-6,y:y-6,w:cw+12,h:ch+52,act:'pick',idx:i});
  });

  // ---- side arrows ----
  _navArrow(lx,ay,AW,AH,'left', hov.act==='left', acc);
  _navArrow(rx,ay,AW,AH,'right',hov.act==='right',acc);
  zones.push({x:lx,y:ay,w:AW,h:AH,act:'left'});
  zones.push({x:rx,y:ay,w:AW,h:AH,act:'right'});

  // ---- position dots ----
  const dotY=sy+ch+62, dg=26, dx0=GW/2-(n-1)*dg/2;
  for(let i=0;i<n;i++){ const on=i===selChar;
    oct.beginPath(); oct.arc(dx0+i*dg,dotY,on?7:5,0,7);
    oct.fillStyle=on?acc:'#444'; oct.fill();
    if(on){ oct.strokeStyle='#fff'; oct.lineWidth=1.5; oct.stroke(); }
  }

  // ---- SELECT button (pulsing, accent-colored) ----
  const bw=280,bh=58,bx=GW/2-bw/2,by=dotY+22;
  const pulse=0.5+0.5*Math.sin(Date.now()/300), hovB=hov.act==='select';
  oct.shadowColor=acc; oct.shadowBlur=16+pulse*16+(hovB?10:0);
  _roundRect(oct,bx,by,bw,bh,29);
  const bg=oct.createLinearGradient(0,by,0,by+bh);
  bg.addColorStop(0,acc); bg.addColorStop(1,_shade(acc,-46));
  oct.fillStyle=bg; oct.fill(); oct.shadowBlur=0;
  _roundRect(oct,bx+4,by+4,bw-8,bh*0.4,17);               // glass highlight
  oct.fillStyle='rgba(255,255,255,0.18)'; oct.fill();
  _roundRect(oct,bx,by,bw,bh,29);                         // rim
  oct.strokeStyle=hovB?'#fff':'rgba(255,255,255,0.65)'; oct.lineWidth=2; oct.stroke();
  oct.fillStyle='#fff'; oct.font='bold 26px monospace';
  oct.shadowColor='rgba(0,0,0,0.55)'; oct.shadowBlur=4;
  oct.fillText('SELECT',GW/2,by+bh/2+9); oct.shadowBlur=0;
  zones.push({x:bx,y:by,w:bw,h:bh,act:'select'});

  // ---- hint ----
  oct.fillStyle='#888'; oct.font='13px monospace';
  oct.fillText('CLICK / TAP A DRIVER OR THE ARROWS  —  SELECT (OR ENTER) TO RACE',GW/2,GH-16);

  window._selZones=zones;
}

function buildSkyline(key){
  const cv=document.createElement('canvas');
  cv.width=1024; cv.height=768;
  const s=cv.getContext('2d');
  const W=1024, HZ=335;

  // DAYTIME branch (Belle Isle, Level 2): blue sky + a far-shore image sitting on a
  // thin river/lake band at the horizon. No night gradient, no orange sodium glow.
  // Keys may carry an L3 phase suffix ('hartplaza@2') — split it off first.
  const _kp=String(key).split('@'), _base=_kp[0], _ph=Math.max(1,Math.min(3,parseInt(_kp[1]||'1',10)||1));
  const _e=SKYLINES[_base]||{};
  // GOLDEN HOUR branch (Downtown, Level 3) — SUNSET→NIGHT over the 3 laps (June 12):
  // phase 1 = golden hour, 2 = deep dusk, 3 = night (stars out, building windows ON).
  // The backdrop strip is tinted on a temp canvas (source-atop = buildings only), so
  // night windows land on real building pixels, never the sky.
  if(_e.golden){
    const P=[null,
      {top:'#2e1038',mid:'#a03818',low:'#e87828',hor:'#ffd27a',sun:0.50,dark:0,    stars:0},
      {top:'#1a0830',mid:'#6e2014',low:'#b04818',hor:'#f0a050',sun:0.28,dark:0.30, stars:0.35},
      {top:'#070218',mid:'#221034',low:'#55202e',hor:'#c05020',sun:0.10,dark:0.58, stars:1}
    ][_ph];
    const gsky=s.createLinearGradient(0,0,0,HZ);
    gsky.addColorStop(0,P.top); gsky.addColorStop(0.45,P.mid);
    gsky.addColorStop(0.8,P.low); gsky.addColorStop(1,P.hor);
    s.fillStyle=gsky; s.fillRect(0,0,W,HZ+18);
    if(P.stars>0){                                  // stars fade in as night falls
      for(let i=0;i<90;i++){
        const sx=(i*131+((i*i*7)%97))%W, sy=((i*53)%(HZ*0.55));
        s.fillStyle='rgba(255,255,255,'+(0.18+0.5*P.stars*((i%3)/2)).toFixed(2)+')';
        s.fillRect(sx,sy,(i%7===0)?2:1,(i%7===0)?2:1);
      }
    }
    const sun=s.createRadialGradient(700,HZ-6,4,700,HZ-6,320);
    sun.addColorStop(0,'rgba(255,232,150,'+P.sun+')'); sun.addColorStop(1,'rgba(255,180,60,0)');
    s.fillStyle=sun; s.fillRect(0,0,W,HZ+18);
    const gim=_e.img;
    if(gim&&gim.naturalWidth){
      const gh=Math.round(gim.naturalHeight/gim.naturalWidth*W);
      const tc=document.createElement('canvas'); tc.width=W; tc.height=gh;
      const tx=tc.getContext('2d');
      tx.drawImage(gim,0,0,W,gh);
      if(P.dark>0){
        tx.globalCompositeOperation='source-atop';

// ============== WINNABLE RACE + COMPETITIVE RIVALS (June 7, 2026) ==============
// THE FATAL FLAW, by the numbers (from the engine's own source): the player's no-boost
// cruise speed is r6×0.8 = 26000×0.8 = 20800, but the engine gives front-running AI cars
// up to 23000×0.905 = 20815 — FASTER than you can ever drive without turbo/slipstream.
// That's why nobody could finish better than ~12th. Worse: our rivals were tagged onto
// back-of-grid cars — the SLOWEST in the field — so they never kept up either.
// THE FIX (player-side, zero engine edits — we just re-tune each car's max speed `r6`
// after the engine builds the grid): green traffic tops out BELOW your cruise (beatable
// with clean driving), and the rival artists run JUST under your flat-out speed — they
// charge to the front, and beating them takes a clean race (turbo/slipstream = your edge).
const FIELD_TUNE = {
  greenLo: 0.62, greenHi: 0.93,        // green AI spread, as a fraction of your cruise
  rivals:  [0.955, 0.965, 0.975],      // rival speeds — fastest rival is the one to beat
  // DIFFICULTY CURVE (June 13, 2026): the Lodge (L1) is already a real fight, but
  // Belle Isle (L2) and Downtown (L3) played TOO EASY (Edmund) — backwards, since the
  // finale should be the hardest. So escalate ONLY the later levels: nudge the whole
  // field's top speed up per level. L1 unchanged, L2 a touch quicker, L3 the tightest.
  // HARD-CLAMPED (rivalMax) so the fastest rival ALWAYS stays under your cruise — the
  // win stays earned, never impossible. levelIdx: 0=Lodge, 1=Belle, 2=Downtown.
  lvlMult: [1.0, 1.018, 1.032],
  rivalMax: 0.99,                      // a rival's top speed can never exceed this fraction of cruise (keeps it winnable)
  greenMax: 0.95                       // same ceiling for green traffic, so it stays passable
};
function tuneFieldSpeeds(){
  if(typeof cars==='undefined'||!cars||typeof u1==='undefined'||!u1) return;
  const cruise=(u1.r6||26000)*0.8;                       // your real no-boost top speed
  const m=(typeof levelIdx!=='undefined' && FIELD_TUNE.lvlMult[levelIdx])||1;   // per-level difficulty multiplier (L1=1.0)
  const rivalCars=new Set(_rivals.map(r=>r.car));
  const greens=cars.filter(c=>c!==u1 && !rivalCars.has(c));
  greens.forEach((c,i)=>{                                // slow→fast spread through the pack
    let f=FIELD_TUNE.greenLo+(FIELD_TUNE.greenHi-FIELD_TUNE.greenLo)*(greens.length>1?i/(greens.length-1):0.5);
    f=Math.min(f*m, FIELD_TUNE.greenMax);                // escalate per level, capped passable
    c.r6=cruise*f;
  });
  _rivals.forEach((r,i)=>{
    const f=Math.min(FIELD_TUNE.rivals[i%FIELD_TUNE.rivals.length]*m, FIELD_TUNE.rivalMax);   // escalate per level, capped under cruise
    r.car.r6=cruise*f;
    r.car._baseR6=r.car.r6;                              // remembered for rubber-banding
    r.car.accel=r.car.r6/1.6;                            // rivals launch hard off the line
  });
}

// Project an arbitrary world point (z, lane offset) to the screen, same math the engine
// uses for cars — used for the roadside billboard.
function _projWorld(z, lane){
  if(typeof v3==='undefined'||!v3||typeof u1==='undefined'||!u1||typeof v2==='undefined'||!v2) return null;
  const segLen=v2.u0Length, count=v3.o9Count(), camIdx=Math.floor(u1.z/segLen);
  const seg=v3.n1(z); if(!seg||!seg.p1||!seg.p1.u6||!seg.p3||!seg.p3.u6) return null;
  const idx=Math.floor(z/segLen);
  const ahead=((idx-camIdx)%count+count)%count;
  if(ahead<1||ahead>=300) return null;                        // behind camera / out of view
  const p1=seg.p1.u6,p2=seg.p2.u6,p3=seg.p3.u6,p4=seg.p4.u6;
  const pct=(((z%segLen)+segLen)%segLen)/segLen;
  const sc=g4(p1.scale,p3.scale,pct); if(!(sc>0)) return null;
  const cx=g4((p1.x+p2.x)/2,(p3.x+p4.x)/2,pct)+sc*lane*width/2;
  const yBottom=g4(p1.y,p4.y,pct);
  return {sc, cx, yBottom};
}

function drawBillboard(){
  if(!_billboardZ || !billboardImg.naturalWidth) return;
  const lane=(typeof window!=='undefined'&&typeof window._bbLane==='number')?window._bbLane:BILLBOARD.lane;
  const size=(typeof window!=='undefined'&&typeof window._bbSize==='number')?window._bbSize:BILLBOARD.size;
  const pr=_projWorld(_billboardZ, lane); if(!pr) return;
  const destW=size*pr.sc*width/2;
  if(destW<16) return;
  const destH=billboardImg.naturalHeight/billboardImg.naturalWidth*destW;
  const left=pr.cx-destW/2, top=pr.yBottom-destH;             // pole base sits at ground level
  if(left>1024||left+destW<0||top>768||pr.yBottom<0) return;
  hctx.drawImage(billboardImg, left, top, destW, destH);
}

// Project a rival car to its on-screen rect using the engine's exact car formula, so we
// draw the overlay (and suppress the green car) at precisely the engine's position.
function _rivalProj(car){
  if(typeof v3==='undefined'||!v3||typeof u1==='undefined'||!u1||typeof v2==='undefined'||!v2) return null;
  const segLen=v2.u0Length, count=v3.o9Count(), camIdx=Math.floor(u1.z/segLen);
  const seg=v3.n1(car.z); if(!seg||!seg.p1||!seg.p1.u6||!seg.p3||!seg.p3.u6) return null;
  const carIdx=Math.floor(car.z/segLen);
  const ahead=((carIdx-camIdx)%count+count)%count;          // 0..count-1 segments ahead
  if(ahead<1||ahead>=300) return null;                      // own segment (unprojected) / behind / out of view
  const p1=seg.p1.u6,p2=seg.p2.u6,p3=seg.p3.u6,p4=seg.p4.u6;
  // Use the engine's OWN per-car percent (it renders with this; it lags z by one step
  // because the AI sets percent from the old z then advances z). Matching it is what keeps
  // our overlay + green-car suppression locked onto the engine's draw while moving fast.
  const pct=(typeof car.percent==='number')?car.percent:(((car.z%segLen)+segLen)%segLen)/segLen;
  const sc=g4(p1.scale,p3.scale,pct); if(!(sc>0)) return null;
  const cx=g4((p1.x+p2.x)/2,(p3.x+p4.x)/2,pct)+sc*car.x*width/2;
  const yBottom=g4(p1.y,p4.y,pct);
  return {sc, cx, yBottom};
}

// out past the wall at ~2120 in open grass → floated at the horizon). Now ~1900-2400
// so they stand beside the road. Sizes VARIED — heroes (fountain/conservatory dome/
// lighthouse) big, the rest smaller — instead of all ~2600 (the "picket fence" look).
// Spread more evenly around the lap so the back half isn't dead. NOTE: art (baked-in
// bridge water) + L/R mirroring are a separate pass; this is placement only.
// PLACEMENT v3 (June 11): on this WIDE Belle Isle track, lanes of ~2000 left the
// buildings sitting ON the grey asphalt. The concrete barrier sits ~2120 out, so
// landmarks now sit BEYOND the wall (lane ~2700-3000) — road | barrier | grass |
// building, which is how you'd really pass them. Sizes trimmed so they read as
// roadside attractions, not billboards covering the road. Fade-in (drawLandmarks)
// keeps them from floating at the horizon while far.
// CUT (June 11, Edmund's call): the roadside landmark BUILDINGS are removed. Detailed
// illustrated buildings pasted as flat billboards never matched the flat pseudo-3D road
// (style clash + cardboard-on-curves + competing with the skyline backdrop). Belle Isle
// now leans entirely on the far-shore skyline backdrop + the roadside tree layer + speed
// signs + barriers, which read as a cohesive real level. The 12 sprites are still loaded
// above, so any can be brought back by adding a line here — but the recommendation is to
// bake any must-have landmark INTO that zone's skyline backdrop art instead, where it
// matches. Empty = no roadside building sprites drawn.
const BELLE_LANDMARKS = [];
let _landmarks=[];
function spawnLandmarks(){
  _landmarks=[];
  if(levelIdx!==1) return;                                  // Belle Isle only
  if(typeof v2==='undefined'||typeof v3==='undefined'||!v3) return;
  const L=v2.u0Length*v3.o9Count();
  for(const m of BELLE_LANDMARKS){
    const spr=_LM_SPRITES[m.key]; if(!spr) continue;
    _landmarks.push({ z:(((m.at%1)+1)%1)*L, lane:m.side*m.lane, size:m.size, img:spr.img });
  }
}
function drawLandmarks(){
  if(levelIdx!==1||!_landmarks.length) return;
  const camZ=(typeof u1!=='undefined'&&u1)?u1.z:0;
  const L=(typeof v2!=='undefined'&&typeof v3!=='undefined'&&v3)?v2.u0Length*v3.o9Count():1;
  // paint far -> near so nearer landmarks cleanly overdraw farther ones
  const list=_landmarks.map(m=>{ const d=(((m.z-camZ)%L)+L)%L; return {m,d}; }).sort((a,b)=>b.d-a.d);
  for(const {m} of list){
    const spr=m.img; if(!spr.naturalWidth) continue;
    const pr=_projWorld(m.z, m.lane); if(!pr) continue;
    const destW=m.size*pr.sc*width/2;
    // FADE-IN (June 11): while a landmark is a tiny speck it sits right on the horizon
    // line — exactly where the road, the water band and the far shore all meet — so it
    // reads as "floating on the raceway." We now skip it until it's big enough to have
    // dropped below the horizon onto the visible ground, and ramp its opacity in over a
    // short range so it never pops. FADE_IN/FADE_FULL = on-screen widths (px).
    const FADE_IN=44, FADE_FULL=110;
    if(destW<FADE_IN) continue;                             // too small/far → would float at horizon
    const fadeA=Math.min(1,(destW-FADE_IN)/(FADE_FULL-FADE_IN));
    // NO upper size cap: heroes (fountain/lighthouse) SWEEP past the camera like the
    // rival cars instead of popping out of existence.
    const destH=spr.naturalHeight/spr.naturalWidth*destW;
    const x0=pr.cx-destW/2, y0=pr.yBottom-destH;
    if(x0>width||x0+destW<0) continue;                      // fully off the left/right edge
    // GROUND ANCHOR: a soft shadow ellipse under the base so the sprite reads as
    // PLANTED on the grass instead of floating. Fades in with the sprite.
    hctx.save();
    hctx.globalAlpha=0.28*fadeA;
    hctx.fillStyle='#000';
    hctx.beginPath();
    hctx.ellipse(pr.cx, pr.yBottom, destW*0.42, Math.max(3,destW*0.06), 0, 0, Math.PI*2);
    hctx.fill();
    hctx.restore();
    hctx.save();
    hctx.globalAlpha=fadeA;
    if(m.lane<0){ hctx.translate(x0+destW/2,0); hctx.scale(-1,1); hctx.drawImage(spr,-destW/2,y0,destW,destH); }
    else { hctx.drawImage(spr,x0,y0,destW,destH); }
    hctx.restore();
  }
}

function drawRivals(){
  if(!_rivals.length) return;
  const list=[];
  for(const r of _rivals){
    const car=r.car, ch=r.ch;
    const pr=_rivalProj(car); if(!pr) continue;
    const destW=(car._realW||car.width)*pr.sc*width/2;
    if(destW<8) continue;                                    // too distant to bother
    const set=carImgs[ch.name]; if(!set) continue;
    let img=set.straight;
    if(car.s4) img=set.left; else if(car.q8) img=set.right;
    if(!img||!img.naturalWidth) continue;
    const destH=img.naturalHeight/img.naturalWidth*destW;
    const left=pr.cx, top=pr.yBottom-destH;                  // engine anchors sprite at left=cx
    if(left>1024||left+destW<0||top>768||pr.yBottom<0) continue;
    list.push({img,left,top,destW,destH,sc:pr.sc});
  }
  list.sort((a,b)=>a.sc-b.sc);                               // smallest (farthest) first
  for(const d of list){
    hctx.drawImage(d.img,d.left,d.top,d.destW,d.destH);

      spawnSmoke(d.left+d.destW*0.82, d.top+d.destH*0.96, sScale,  0.5);

  }
