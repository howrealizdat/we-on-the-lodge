function overlayTick(){
  if(window._quit) return;            // game exited — stop the loop dead (no reschedule)
  if(document.getElementById('lodge-overlay').style.display==='none') return;
  if(state===ST.LOAD&&loaded>=TOTAL) state=ST.TITLE;
  if(justPressed.size){
    for(const code of justPressed){
      if(state===ST.TITLE&&(code==='Enter'||code==='Space')){ if(_warnGate){ startWarning(); } else { unlockAudio(); state=ST.SELECT; } }
      else if(state===ST.SELECT){
        if(code==='ArrowLeft'){       selChar=(selChar+CHARS.length-1)%CHARS.length; _navClick(); }
        else if(code==='ArrowRight'){ selChar=(selChar+1)%CHARS.length; _navClick(); }
        else if(code==='Enter'||code==='Space'){
          chosenChar=CHARS[selChar];
          stopAllMusic();                                    // hard cut the moment you pick (intro/race starts its own)
          const vid=INTRO_VIDEOS[chosenChar.name];
          if(vid){ startIntro(vid); break; }                 // intro video, then race
          if(HOWTO_SCREEN_ON){ state=ST.HOWTO; }
          else { launchRace(); return; }                     // no video: straight to the race
        }
      }
      else if(state===ST.INTRO){ _introTrySkip(); break; }   // ANY key skips — but only after the 2s lock
      else if(state===ST.HOWTO&&(code==='Enter'||code==='Space')){ launchRace(); return; }
    }
    justPressed.clear();
  }
  oct.clearRect(0,0,GW,GH); oct.textAlign='left';
  switch(state){
    case ST.LOAD:   drawLoading(); break;
    case ST.TITLE:  drawTitle();   break;
    case ST.SELECT: drawSelect();  break;
    case ST.HOWTO:  drawHowTo();   break;
    case ST.INTRO:  break;                                   // the <video> element covers the screen
  }
  requestAnimationFrame(overlayTick);
}
overlayTick();

    start:{t:'button',i:9}                          // Start

      $('gpWizCue').textContent='Set: STEERING';
    } else {
      $('gpWizSub').textContent='Press the button you want for this action.';
      $('gpWizCue').textContent='Press for: '+it.label;
    }
    $('gpWizHint').innerHTML='&nbsp;';
    setTimeout(()=>{ capArmed=true; }, 280);   // settle so a held button from the previous step doesn't bleed in
  }
  function recordAndAdvance(entry){
    capDraft[curItem().id]=entry;
    $('gpWizHint').textContent='Got it: '+mapDesc(entry);
    capPos++;
    if(capPos>=capIds.length) finishCapture();
    else setTimeout(armStep, 220);
  }
  function finishCapture(){
    gpMap=capDraft; saveMap();
    if(capIds.length===ITEMS.length){ gpOn=true; lsSet('lodge_gp_on','1'); }  // full setup also switches it on
    capActive=false; wiz.style.display='none';
    updateGear(); openModal();
  }
  $('gpWizSkip').addEventListener('click', ()=>{ if(!capActive) return; capPos++; if(capPos>=capIds.length) finishCapture(); else armStep(); });
  $('gpWizCancel').addEventListener('click', ()=>{ capActive=false; wiz.style.display='none'; openModal(); });

  function capPoll(gp){
    if(!capActive || !capArmed || !gp || !capBaseline) return;
    if(capWaitRelease){
      // wait for the captured control to return to neutral before accepting the next
      const stillL = capWaitRelease.t==='dpad' ? (steerDir(gp,capWaitRelease,'left')||steerDir(gp,capWaitRelease,'right')) : evalKey(gp,capWaitRelease);
      if(!stillL) capWaitRelease=null;
      return;
    }
    const steerMode = curItem().kind==='steer';
    // axes first (covers stick + hat d-pads)
    for(let i=0;i<gp.axes.length;i++){
      const v=gp.axes[i]; const base=capBaseline.a[i]||0;
      if(Math.abs(v-base)>0.6){
        const e = steerMode ? {t:'axis',i} : {t:'axis',i,d:((v-base)>0?1:-1)};
        capWaitRelease=e; recordAndAdvance(e); return;
      }
    }
    // buttons
    for(let i=0;i<gp.buttons.length;i++){
      const v=gp.buttons[i]?gp.buttons[i].value:0; const base=capBaseline.b[i]||0;
      if(v>0.6 && base<0.4){
        const e = (steerMode && (i>=12 && i<=15)) ? {t:'dpad'} : {t:'button',i};
        capWaitRelease=e; recordAndAdvance(e); return;
      }
    }
  }

  // ---- gear visibility (desktop title screen only) ----
  function updateGear(){
    const show = (!isTouch) && onTitle();
    const disp = show ? 'block' : 'none';
    if(gear.style.display!==disp) gear.style.display=disp;
    gear.classList.toggle('on', gpOn && padConnected());
    if(modal.style.display==='flex'){ const st=$('gpStatus'); if(st) st.textContent=statusText(); }
  }
  window.addEventListener('gamepadconnected', updateGear);
  window.addEventListener('gamepaddisconnected', updateGear);

  // ---- main translate loop: pad → synthetic keys (the whole point) ----
  const prev={};
  function fire(id, now, key, code, kc){
    if(now!==!!prev[id]){ _synthKey(now, key, code, kc); prev[id]=now; }   // same path keyboard/touch use
  }
  function loop(){
    const gp=activePad();
    if(gp){
      if(capActive){ capPoll(gp); }                       // while remapping, don't drive the car
      else if(gpOn && mapComplete()){
        for(const id in KEYS){ const k=KEYS[id]; fire(id, evalKey(gp, gpMap[id]), k.key, k.code, k.kc); }
        fire('steerL', steerDir(gp, gpMap.steer, 'left'),  STEER_L.key, STEER_L.code, STEER_L.kc);
        fire('steerR', steerDir(gp, gpMap.steer, 'right'), STEER_R.key, STEER_R.code, STEER_R.kc);
      }
    }
    updateGear();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
